<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Now-Playing classical preview</title>
<meta name="viewport" content="width=1200, user-scalable=yes">
<link rel="stylesheet" href="/static/css/fonts.css">
<link rel="stylesheet" href="/static/css/tokens.css">
<style>
:root { --rule-faint: #909090; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #222; }
body {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: calc(60 * var(--u)) 0;
  gap: calc(20 * var(--u));
}
.scaler { width: 1200px; height: 825px; }
.face {
  width: 1200px; height: 825px;
  background: var(--paper); color: var(--ink);
  display: grid; grid-template-columns: 825px minmax(0, 1fr);
}
.np-art {
  background: #000; display: flex; align-items: center; justify-content: center;
  color: #888; font-family: var(--font-mono);
  font-size: calc(40 * var(--u)); letter-spacing: 0.18em;
  overflow: hidden;
}
.np-art img { width: 100%; height: 100%; object-fit: contain; display: block; }

.np-right {
  position: relative;
  min-width: 0;
  padding: calc(32 * var(--u));
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: calc(8 * var(--u));
}
.np-right .source-anchor {
  position: absolute;
  top: calc(32 * var(--u));
  left: calc(32 * var(--u));
  right: calc(32 * var(--u));
  font-family: var(--font-mono);
  font-size: calc(22 * var(--u));
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--mid);
}
.np-right .clock-anchor {
  position: absolute;
  right: calc(32 * var(--u));
  bottom: calc(32 * var(--u));
  font-family: var(--font-serif);
  font-variation-settings: 'opsz' 36, 'wght' 500;
  font-feature-settings: 'tnum' 1;
  font-size: calc(28 * var(--u));
  color: var(--ink);
}
.composer {
  font-family: var(--font-mono);
  font-size: calc(26 * var(--u));
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 400;
  line-height: 1.25;
  padding-bottom: calc(10 * var(--u));
  border-bottom: 1px solid var(--rule-faint);
}
.composer:empty { display: none; }
.work {
  font-family: var(--font-serif);
  font-variation-settings: 'opsz' 36, 'wght' 500;
  line-height: 1.06;
  margin-top: calc(4 * var(--u));
  hyphens: none;
}
.work[data-size='l']  { font-size: calc(48 * var(--u)); }
.work[data-size='m']  { font-size: calc(38 * var(--u)); }
.work[data-size='s']  { font-size: calc(32 * var(--u)); }
.work[data-size='xs'] { font-size: calc(26 * var(--u)); line-height: 1.12; }

.movement {
  font-family: var(--font-serif); font-style: italic;
  font-variation-settings: 'opsz' 24, 'wght' 400;
  font-size: calc(26 * var(--u));
  line-height: 1.18;
  color: var(--ink);
}
.movement:empty { display: none; }

.performers {
  font-family: var(--font-mono);
  font-size: calc(24 * var(--u));
  text-transform: uppercase;
  letter-spacing: 0.10em;
  line-height: 1.45;
  padding-top: calc(10 * var(--u));
  border-top: 1px solid var(--rule-faint);
}
.performers .row { display: flex; align-items: baseline; gap: calc(8 * var(--u)); }
.performers .role {
  color: var(--rule-faint);
  letter-spacing: 0.16em;
  font-size: calc(18 * var(--u));
  width: calc(78 * var(--u));
  flex-shrink: 0;
}
.performers .role:empty { display: none; }
.performers .row:has(.role:empty) .name { margin-left: 0; }
.performers .year-row .name {
  font-size: calc(20 * var(--u));
  letter-spacing: 0.18em;
  color: var(--rule-faint);
  margin-top: calc(4 * var(--u));
}
.performers .name {
  flex: 1;
  min-width: 0;            /* allow wrapping inside the flex item */
  white-space: normal;
  overflow-wrap: anywhere;
  hyphens: none;
}

/* Non-classical tracks reuse the classical DOM with the same separators:
 * artist → composer slot (mono caps + hairline below)
 * album  → work slot (serif, sized by length)
 * track  → performers slot (mono caps + hairline above)
 * Movement stays empty (:empty hides it).
 */

/* === Navigation chrome (outside the panel) === */
.nav {
  display: flex; align-items: center; justify-content: center;
  gap: calc(24 * var(--u));
  font-family: ui-monospace, 'IBM Plex Mono', monospace;
  font-size: calc(20 * var(--u));
  color: #ddd;
  user-select: none;
}
.nav button {
  background: transparent; color: #ddd; border: 1px solid #888;
  border-radius: calc(6 * var(--u));
  font: inherit;
  padding: calc(8 * var(--u)) calc(20 * var(--u));
  cursor: pointer;
}
.nav button:hover { background: #444; border-color: #ddd; }
.nav button:disabled { opacity: 0.4; cursor: default; }
.nav .pos {
  min-width: calc(100 * var(--u));
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.nav .meta {
  margin-left: calc(20 * var(--u));
  color: #888;
  font-size: calc(14 * var(--u));
}
</style></head>
<body>

<div class="nav">
  <button id="prev" aria-label="Previous">←</button>
  <div class="pos"><span id="pos">…</span></div>
  <button id="next" aria-label="Next">→</button>
  <span class="meta" id="meta"></span>
</div>

<div class="scaler"><div class="face">
  <section class="np-art">
    <img id="art" src="" onerror="this.style.visibility='hidden';" alt="">
    <div id="art-fallback" style="position:absolute;color:#888;font-family:var(--font-mono);font-size:calc(40 * var(--u));letter-spacing:0.18em;display:none;">[ ALBUM ART ]</div>
  </section>
  <section class="np-right" id="right">
    <div class="source-anchor">Sonos · Spotify</div>
    <div class="composer" id="composer"></div>
    <div class="work" id="work" data-size="m"></div>
    <div class="movement" id="movement"></div>
    <div class="performers" id="performers"></div>
    <div class="clock-anchor" id="clock">15:48</div>
  </section>
</div></div>

<script>
(async () => {
  const TRACKS = await fetch('/debug/now-playing-classical-mock/tracks.json').then(r => r.json());

  // Pick work font-size bucket by character count of the work title.
  function workBucket(s) {
    const n = [...s].length;
    if (n <= 14) return 'l';
    if (n <= 22) return 'm';
    if (n <= 34) return 's';
    return 'xs';
  }

  function render(i) {
    const t = TRACKS[i];
    const right = document.getElementById('right');
    const art = document.getElementById('art');
    const fb = document.getElementById('art-fallback');
    if (t.art_url) {
      art.style.visibility = '';
      fb.style.display = 'none';
      art.src = t.art_url;
    } else {
      art.style.visibility = 'hidden';
      fb.style.display = 'block';
    }

    // Map both classical and non-classical to the same three-row structure.
    // For non-classical, follow the universal music-app convention:
    //   top label      ← composer  (classical)  | artist (pop)
    //   work title     ← work      (classical)  | track  (pop) — biggest
    //   subtitle       ← movement  (classical)  | —      (pop, hidden)
    //   bottom strip   ← performers(classical)  | album  (pop)
    const top = t.classical ? (t.composer || '') : (t.performers[0]?.name || '');
    const work = t.classical ? (t.work || '') : (t.title_spotify || t.work || '');
    const sub = t.classical ? (t.movement || '') : '';
    document.getElementById('composer').textContent = top;
    const workEl = document.getElementById('work');
    workEl.textContent = work;
    workEl.setAttribute('data-size', workBucket(work));
    document.getElementById('movement').textContent = sub;
    const perf = document.getElementById('performers');
    perf.innerHTML = '';
    function addRow(roleText, nameText) {
      const row = document.createElement('div'); row.className = 'row';
      const role = document.createElement('span'); role.className = 'role'; role.textContent = roleText || '';
      const name = document.createElement('span'); name.className = 'name'; name.textContent = nameText;
      row.appendChild(role); row.appendChild(name); perf.appendChild(row);
    }
    if (t.classical) {
      for (const p of t.performers) addRow(p.role || '', p.name);
      if (t.first_release_year) {
        const row = document.createElement('div'); row.className = 'row year-row';
        const role = document.createElement('span'); role.className = 'role';
        const name = document.createElement('span'); name.className = 'name';
        name.textContent = t.first_release_year;
        row.appendChild(role); row.appendChild(name); perf.appendChild(row);
      }
    } else {
      // Pop: bottom strip is the album line, with year appended (no chip).
      const row = document.createElement('div'); row.className = 'row';
      const name = document.createElement('span'); name.className = 'name';
      name.textContent = (t.album || '') + (t.first_release_year ? ` · ${t.first_release_year}` : '');
      row.appendChild(name); perf.appendChild(row);
    }

    document.getElementById('pos').textContent = `${i+1} / ${TRACKS.length}`;
    document.getElementById('prev').disabled = i === 0;
    document.getElementById('next').disabled = i === TRACKS.length - 1;
    document.getElementById('meta').textContent = t.classical
      ? `classical · ${t.status}`
      : `non-classical · ${t.status}`;
    history.replaceState(null, '', `?i=${i+1}`);
  }

  const url = new URL(location.href);
  let idx = Math.max(0, Math.min(TRACKS.length - 1,
    parseInt(url.searchParams.get('i') || '1', 10) - 1));
  render(idx);

  document.getElementById('prev').addEventListener('click', () => { if (idx > 0) render(--idx); });
  document.getElementById('next').addEventListener('click', () => { if (idx < TRACKS.length - 1) render(++idx); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' && idx > 0) render(--idx);
    if (e.key === 'ArrowRight' && idx < TRACKS.length - 1) render(++idx);
  });
})();
</script>

</body></html>
