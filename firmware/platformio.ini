; Dual-target PlatformIO config.
;
; * `inkplate10` — on-device build for Soldered Inkplate 10 (ESP32).
;   Sources under firmware/src/ + firmware/src/hal/real/ are linked.
;   (Pulled in by `add-device-firmware`.)
;
; * `native`     — host build for the simulator. Uses the system compiler.
;   Sources under firmware/src/ + firmware/test/hal/mock/ + firmware/test/...
;
; Prefer the CMake target for simulator work (see firmware/CMakeLists.txt);
; this file is here so the same repo supports a straight PlatformIO workflow
; for device flashing once firmware is written.

[platformio]
default_envs = native

[env]
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc

[env:inkplate10]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
  e-radionicacom/InkplateLibrary@^10.2.2
  knolleary/PubSubClient@^2.8
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
  -UARDUINO_ESP32_DEV
  -DARDUINO_INKPLATE10V2
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_filter =
  +<*>
  -<smoketest.cpp>
  -<sensor_probe.cpp>
  -<tap_probe.cpp>
  -<epd_probe.cpp>
upload_speed = 460800
monitor_speed = 115200

; Minimal smoke test: WiFi + HTTP fetch + drawImage. No sensors, no MQTT.
; Excludes main.cpp (which owns setup/loop) and the real-HAL wrappers so the
; build stays small and independent of the rest of the firmware.
[env:smoketest]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
  e-radionicacom/InkplateLibrary@^10.2.2
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
  -DSMOKETEST
  -UARDUINO_ESP32_DEV
  -DARDUINO_INKPLATE10V2
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_filter =
  +<smoketest.cpp>
upload_speed = 460800
monitor_speed = 115200

; Sensor probe: scans easyC I2C bus, identifies attached devices, prints live
; accelerometer + PIR readings. Flash once when sensors are wired to confirm
; everything is mounted and talking. No WiFi, no MQTT.
[env:sensor_probe]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
  e-radionicacom/InkplateLibrary@^10.2.2
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
  -DSENSOR_PROBE
  -UARDUINO_ESP32_DEV
  -DARDUINO_INKPLATE10V2
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_filter =
  +<sensor_probe.cpp>
upload_speed = 460800
monitor_speed = 115200

; Tap probe: configures LSM6DS3 INT1 (open-drain, active-low, single+double
; tap on all axes) and prints GPIO 36 transitions so the operator can verify
; the INT1 -> IO36 solder joint without involving deep sleep.
[env:tap_probe]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
  e-radionicacom/InkplateLibrary@^10.2.2
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
  -DTAP_PROBE
  -UARDUINO_ESP32_DEV
  -DARDUINO_INKPLATE10V2
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_filter =
  +<tap_probe.cpp>
upload_speed = 460800
monitor_speed = 115200

; EPD power-supply probe: diagnose TPS65186 fault state after a panel-frozen
; incident. Dumps PMIC registers (PWR_GOOD, INT1/INT2, ENABLE, TMST_VALUE,
; REVID), MCP23017 expander pin state, then attempts four graduated software
; recoveries (plain einkOn, einkOff/delay/einkOn, WAKEUP cycle, full
; sequencer re-init) and a functional partialUpdate. Pure diagnostic — no
; WiFi/MQTT, no schedule. See firmware/src/epd_probe.cpp.
[env:epd_probe]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
  e-radionicacom/InkplateLibrary@^10.2.2
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
  -DEPD_PROBE
  -UARDUINO_ESP32_DEV
  -DARDUINO_INKPLATE10V2
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
build_src_filter =
  +<epd_probe.cpp>
upload_speed = 460800
monitor_speed = 115200

[env:native]
platform = native
build_flags =
  -std=gnu++17
  -Wall -Wextra -Wpedantic
  -Iinclude
  -Isrc
  -Itest
test_build_src = yes
