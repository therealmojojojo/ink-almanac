# MQTT integration config — the Mosquitto add-on is the broker.
# The device (firmware) publishes to inkplate/state/* and subscribes to inkplate/command/*.
# Sleep-strategy bundle is published by HA to inkplate/command/sleep_strategy (retained).

mqtt:
  sensor:
    # Mirror the device's retained state payload into HA sensors so other automations
    # (low-battery, diagnostics) can consume it declaratively.
    - name: "Inkplate device battery"
      unique_id: inkplate_device_battery
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.percentage }}"
      unit_of_measurement: "%"
      device_class: battery

    - name: "Inkplate device voltage"
      unique_id: inkplate_device_voltage
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.voltage }}"
      unit_of_measurement: "V"
      device_class: voltage

    - name: "Inkplate device wake reason"
      unique_id: inkplate_device_wake_reason
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.wake_reason }}"

    - name: "Inkplate device active mode"
      unique_id: inkplate_device_active_mode
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.active_mode }}"

    - name: "Inkplate device build"
      unique_id: inkplate_device_build
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.build }}"

    # WiFi RSSI in dBm — the device's view of its association quality at the
    # moment of the most recent Full publish. Healthy: -30 to -65. Marginal:
    # -65 to -75. Unreliable: -75 and below. 0 means not connected (the
    # firmware default when WL_CONNECTED is false). Useful for deciding
    # whether to reposition the device or add a coverage AP.
    - name: "Inkplate device WiFi RSSI"
      unique_id: inkplate_device_wifi_rssi
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.wifi_rssi | default(0) | int }}"
      unit_of_measurement: "dBm"
      device_class: signal_strength

    # Diag ring — last ~32 wakes' compact summary (reason/path/mode/flags/cycles).
    # Populated by firmware ≥0.4.0-diag-ring. Exposed as a sensor so the
    # operator can read it from Developer Tools → States during a freeze
    # without needing mosquitto_sub. The string can run >255 chars; HA
    # truncates the displayed state but the full string is retained as
    # the `diag_full` attribute.
    - name: "Inkplate device diag"
      unique_id: inkplate_device_diag
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.diag | default('', true) | truncate(250, True) }}"
      json_attributes_topic: "inkplate/state/device"
      json_attributes_template: "{{ {'diag_full': value_json.diag | default('')} | tojson }}"

    # Mirror of the face the device most recently RENDERED. Sourced from
    # the retained `inkplate/state/device` payload that the firmware
    # publishes at the end of every Full (`active_mode` field, set to the
    # face that was actually drawn — see firmware/src/main_loop.cpp `tick`
    # and battery.cpp toDeviceStateJson).
    #
    # Used by the schedule-tap handler to flip relative to what's actually
    # on screen. The previous topic (`inkplate/command/active_mode`) was
    # the *last-commanded-by-HA* face, which diverges from the displayed
    # face whenever the device sleeps through an alternation publish (HA
    # ticks at /15, device Full cadence is 15/30/30/60 min — so most
    # commands are unheard until the device's next Full). On divergence
    # the tap handler computed a flip relative to a phantom face,
    # producing a refresh that re-rendered the same face the user was
    # already looking at.
    - name: "Inkplate commanded face"
      unique_id: inkplate_commanded_face
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.active_mode }}"

    # Device-side schedule hash — FNV-32 of the JSON payload that produced
    # the schedule the device is currently running on. Pair with
    # `sensor.inkplate_schedule_hash_expected` (HA-side, computed over the
    # last published payload) to confirm the device adopted the latest
    # schedule. When they match, the device is on the operator's intended
    # cadence; when they differ for more than ~30 min, the device hasn't
    # had a Full / Poll / PollPartial wake since the last edit (battery
    # the prime suspect).
    #
    # Value `00000000` means the device is running on its baked-in default
    # schedule (no operator-published schedule has ever been read by this
    # device). Expected after a fresh flash; persistent across HA restarts.
    - name: "Inkplate device schedule hash"
      unique_id: inkplate_device_schedule_hash
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.schedule_hash | default('00000000') }}"

    # Raw PWR_GOOD byte from the TPS65186 PMIC at the END of every Full
    # wake (after the draw, after the library's einkOff()). Surfaced as
    # a string sensor so HA Developer Tools shows e.g. "0x00" (healthy
    # off), "0xFA" (still on — should be transient), "0xA0" (the
    # partial-power wedge documented in
    # openspec/changes/prevent-tps65186-partial-power-wedge), or "0xFF"
    # (chip stopped ACKing — also a valid off state on Inkplate 10
    # where the PMIC's I2C goes quiet with WAKEUP low).
    #
    # Use case: when the panel freezes, the operator opens this sensor
    # to identify the wedge class without flashing the USB diagnostic.
    # Entity_id is derived by HA from `name`: "EPD PWR_GOOD raw" →
    # `sensor.inkplate_device_epd_pwr_good_raw`. (object_id isn't allowed
    # in YAML-configured MQTT entities, so we accept HA's slugification.)
    - name: "Inkplate device EPD PWR_GOOD raw"
      unique_id: inkplate_device_epd_pg_raw
      state_topic: "inkplate/state/device"
      value_template: "{{ value_json.epd_pg_raw | default('0xFA') }}"

  binary_sensor:
    # EPD power-good — exposed by the firmware after probing the TPS65186
    # PMIC at the START of every Full (via einkOn()). False means the
    # chip is wedged AT THIS WAKE; the panel will show stale pixels until
    # the operator removes the LiPo. See
    # openspec/changes/add-epd-power-good-diagnostic for the alert path.
    - name: "Inkplate device EPD power good"
      unique_id: inkplate_device_epd_pwrgood
      state_topic: "inkplate/state/device"
      device_class: problem
      value_template: "{{ value_json.epd_pwrgood }}"
      payload_on: "False"
      payload_off: "True"

    # EPD clean-down — exposed by the firmware after the draw and
    # ensurePanelDown probe at the END of every Full. False means the
    # rails didn't drain in the 3-second budget, i.e. the wedge has
    # *just been entered* and the NEXT wake will probably find
    # epd_power_good = false. This is a PREDICTIVE warning: it fires
    # ahead of the freeze, not after. See
    # openspec/changes/prevent-tps65186-partial-power-wedge.
    - name: "Inkplate device EPD down clean"
      unique_id: inkplate_device_epd_down_clean
      state_topic: "inkplate/state/device"
      device_class: problem
      value_template: "{{ value_json.epd_down_clean }}"
      payload_on: "False"   # device_class=problem inverts: on = problem (unclean)
      payload_off: "True"
