# Command-line sensors, in the current (2023.6+) `command_line:` integration
# format. Legacy `- platform: command_line` under `sensor:` is silently
# ignored by modern HA. This file lives in integrations/ because it needs
# a dict root (the legacy list-root format was compatible with
# !include_dir_merge_list but the new dict-root format isn't).

command_line:
  # Night-mode poetic weather line — reads the file written by
  # generate_poetic_weather_line.sh. scan_interval keeps the sensor fresh
  # within minutes of new generations; the publish_weather automation triggers
  # on this sensor's state change, so the renderer gets the new line promptly.
  # If the file is absent at boot, `cat ... || true` yields empty output and
  # the sensor reports empty — Night face then renders without the poetic line
  # per the graceful-degradation rule.
  - sensor:
      name: inkplate_poetic_weather_line
      unique_id: inkplate_poetic_weather_line
      command: "/bin/sh -c 'cat /config/custom/inkplate/state/poetic_weather.txt 2>/dev/null || true'"
      scan_interval: 300
      value_template: "{{ value | default('', true) }}"

  # Operator's wake schedule, validated and rendered to canonical JSON by
  # `validate_wake_schedule.py`. The script applies all the same rules the
  # firmware enforces (bounds, divisibility, alignment, distinct starts)
  # so a typo in `wake_schedule.yaml` fails loud at deploy time rather than
  # silently at the device's next Full wake.
  #
  # The script emits `{"hash": "<hex>", "payload": "<canonical-json>"}`.
  # The sensor's STATE is the 8-hex-digit FNV-32 (well under HA's 255-char
  # state limit and directly comparable against the device-side hash). The
  # full payload sits in the `payload` json attribute and is what the
  # publish automation forwards to MQTT.
  #
  # On validator failure the script exits non-zero with empty stdout →
  # `value_json` is None → state goes `unknown`, which the publish
  # automation maps to a persistent_notification.
  - sensor:
      name: inkplate_schedule_hash_expected
      unique_id: inkplate_schedule_hash_expected
      command: "python3 /config/custom/inkplate/scripts/validate_wake_schedule.py"
      scan_interval: 300
      value_template: "{{ value_json.hash | default('') }}"
      json_attributes:
        - hash
        - payload

  # Tonight's Stars-cell statement — produced daily by
  # generate_astro_event.py (Skyfield + Launch Library 2 + RSS + Haiku
  # phrasing) and written to state/astro_event.txt.
  #
  # Freshness guard: emit the empty string when astro_event.txt is older
  # than 30 hours. The renderer then falls back to the literal "no event
  # tonight" treatment instead of surfacing yesterday's line indefinitely
  # if the morning cron silently fails.
  - sensor:
      name: astro_event_tonight
      unique_id: astro_event_tonight
      command: >-
        /bin/sh -c '
        f=/config/custom/inkplate/state/astro_event.txt;
        [ -f "$f" ] || exit 0;
        age=$(( $(date +%s) - $(stat -c %Y "$f" 2>/dev/null || stat -f %m "$f") ));
        [ "$age" -gt 108000 ] && exit 0;
        cat "$f"
        '
      scan_interval: 300
      value_template: "{{ value | default('', true) }}"
