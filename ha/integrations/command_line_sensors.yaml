# Command-line sensors, in the current (2023.6+) `command_line:` integration
# format. Legacy `- platform: command_line` under `sensor:` is silently
# ignored by modern HA. This file lives in integrations/ because it needs
# a dict root (the legacy list-root format was compatible with
# !include_dir_merge_list but the new dict-root format isn't).

command_line:
  # (inkplate_curated_news sensor removed alongside the curated-news live
  # regeneration pipeline. The Smart pill is now sourced from the
  # deterministic per-day `summary.smart_pill.body` field, staged into
  # renderer/inputs/news.json directly by pairing/publish_today.py.)

  # Night-mode poetic weather line — reads the file written by
  # generate_poetic_weather_line.sh. scan_interval keeps the sensor fresh
  # within minutes of new generations; the publish_weather automation triggers
  # on this sensor's state change, so the renderer gets the new line promptly.
  # If the file is absent at boot, `cat ... || true` yields empty output and
  # the sensor reports empty — Night face then renders without the poetic line
  # per the graceful-degradation rule.
  - sensor:
      name: inkplate_poetic_weather_line
      unique_id: inkplate_poetic_weather_line
      command: "/bin/sh -c 'cat /config/custom/inkplate/state/poetic_weather.txt 2>/dev/null || true'"
      scan_interval: 300
      value_template: "{{ value | default('', true) }}"

  # Tonight's astronomical event line — LLM-generated daily by
  # generate_astro_event.sh, written to state/astro_event.txt. Mirrors the
  # inkplate_poetic_weather_line pattern. Replaces the earlier in-the-sky.org
  # scraper, which broke when the source site's DOM changed.
  - sensor:
      name: astro_event_tonight
      unique_id: astro_event_tonight
      command: "/bin/sh -c 'cat /config/custom/inkplate/state/astro_event.txt 2>/dev/null || true'"
      scan_interval: 300
      value_template: "{{ value | default('', true) }}"
