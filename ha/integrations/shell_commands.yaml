# Registered shell_command: entries. Loaded via the packages mechanism
# (homeassistant.packages: !include_dir_named custom/inkplate/integrations),
# so the top-level key MUST be the domain (`shell_command`).
# Paths are the in-container /config/custom/inkplate/ layout after deploy.

shell_command:
  # One-shot regeneration of the full triplet pool. Operator-fired (HA
  # Developer Tools → Services); not on a cadence. See generate_triplets.sh
  # for the rationale.
  generate_triplets: >-
    /usr/bin/env bash -c '
    cd /config/custom/inkplate/scripts &&
    ./generate_triplets.sh
    '

  # Daily 06:00 — pick today's triplet by sequence rotation and write it
  # to renderer/inputs/. Fired by ha/automations/publish_today_pairing.yaml.
  publish_today_pairing: >-
    /usr/bin/env bash -c '
    cd /config/custom/inkplate/scripts &&
    ./publish_today_pairing.sh
    '

  generate_poetic_weather_line: >-
    /usr/bin/env bash -c '
    cd /config/custom/inkplate/scripts &&
    ./generate_poetic_weather_line.sh "{{ summary }}" "{{ temp_c }}" "{{ wind }}" "{{ bucket }}"
    '

  # SSH-invokes the renderer host (where Skyfield + DE421 + the Anthropic
  # SDK live), captures stdout, writes locally to state/astro_event.txt.
  # See ha/scripts/generate_astro_event.sh for rationale. Invoked via
  # `bash <path>` rather than `./<path>` because the deploy tarball does
  # not preserve the execute bit.
  generate_astro_event: >-
    bash /config/custom/inkplate/scripts/generate_astro_event.sh
    "{{ lat }}" "{{ lon }}" "{{ tz_offset }}"

  # generate_curated_news removed — the Smart pill is now sourced from the
  # day's summary item sidecar (`summary.smart_pill.body`) by
  # pairing/publish_today.py, no live Claude regeneration.

  fetch_sonos_art: >-
    /usr/bin/env bash -c '
    cd /config/custom/inkplate/scripts &&
    ./fetch_sonos_art.sh "{{ url }}" "{{ title }}" "{{ artist }}" "{{ album }}" "{{ source }}" "{{ ha_base }}" "{{ token }}"
    '

  purge_stale_sonos_art: >-
    /usr/bin/env bash -c '
    cd /config/custom/inkplate/scripts &&
    ./purge_stale_sonos_art.sh
    '
