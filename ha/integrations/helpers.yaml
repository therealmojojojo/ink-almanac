# Helper entities — loaded as a package so they're versioned, not clicked into place.

input_text:
  inkplate_active_override:
    name: Inkplate active override
    initial: schedule
    max: 32
    # Allowed values: schedule | now_playing | weather_peek | summary_gallery_toggle
    #
    # Activation model: explicit intent (tap) activates unconditionally (outside
    # quiet hours); ambient signals (schedule, Sonos) activate unless preempted
    # by an explicit override. Precedence governs *deactivation* — what state
    # to restore when the current override ends. See the restore cascade in
    # gesture_override.yaml / now_playing_override.yaml and the narrative in
    # ha/docs/architecture.md.

  inkplate_prior_override:
    name: Inkplate prior override
    initial: schedule
    max: 32
    # Invariant: prior_override SHALL NEVER equal active_override.
    # Re-triggering the same state leaves prior untouched.

  inkplate_scheduled_face:
    name: Inkplate scheduled face
    initial: summary
    max: 16
    # summary | gallery | night — the face the schedule *would* show, ignoring overrides

  inkplate_kitchen_sonos_entity:
    name: Inkplate kitchen Sonos entity
    initial: media_player.kitchen_sonos
    max: 64

  inkplate_now_playing_content_id:
    name: Inkplate Now-Playing content id
    initial: ""
    max: 255
    # Stable per-track identifier (Sonos media_content_id or title+artist+album fallback).
    # Track-change detection compares the incoming content id against this holder.

input_datetime:
  inkplate_weather_peek_expires_at:
    name: Inkplate weather-peek expiry
    has_time: true
    has_date: true
    # Datetime when the current single-tap-triggered weather peek ends.
    # Updated by the gesture handler on single-tap activation; the expiry
    # automation triggers at this time and reverts the override.

  inkplate_sonos_active_start:
    name: Sonos active window start
    has_time: true
    has_date: false
    initial: "07:00:00"

  inkplate_sonos_active_end:
    name: Sonos active window end
    has_time: true
    has_date: false
    initial: "20:00:00"

  # TEMPORARY: quiet window shifted to 05:00-05:01 for the 5000km-remote
  # test session. The real production defaults are 00:00-05:00 — restore
  # before shipping. The 60-second window is functionally "no quiet hours"
  # so tap gestures and Sonos activation aren't blocked while the operator
  # is testing at Bucharest midnight.
  inkplate_quiet_start:
    name: Quiet hours start
    has_time: true
    has_date: false
    initial: "05:00:00"

  inkplate_quiet_end:
    name: Quiet hours end
    has_time: true
    has_date: false
    initial: "05:01:00"

input_number:
  inkplate_fast_path_interval_seconds:
    name: Sonos fast-path interval (seconds)
    min: 60
    max: 600
    step: 10
    initial: 180
    unit_of_measurement: s

  inkplate_linger_seconds:
    name: Now-Playing linger (seconds)
    min: 30
    max: 900
    step: 10
    initial: 90
    unit_of_measurement: s

  inkplate_weather_peek_seconds:
    name: Weather-peek window (seconds)
    min: 60
    max: 900
    step: 30
    initial: 300
    unit_of_measurement: s
    # How long a tap-triggered weather_peek override lasts before the expiry
    # automation auto-reverts. Bumped from 60 s → 300 s when the gesture
    # handler moved from single-tap (which the wire-tied frame mount can't
    # reliably emit — every shock rings as a double) to double-tap as the
    # weather-peek trigger. Five minutes gives the operator enough time to
    # actually use the forecast before it auto-reverts.

  inkplate_alternation_offset:
    name: Inkplate face alternation offset (0 or 1)
    min: 0
    max: 1
    step: 1
    initial: 0
    # Phase shift for the per-tier face alternation engine (schedule.yaml).
    # Each tier alternates its main face (Summary in Morning, Gallery in
    # Midday/Evening) with Weather every Full-refresh interval. The offset
    # XORs the natural parity, so a double-tap in Summary/Gallery flips the
    # currently-shown face to Weather (and from Weather flips back to main).
    # The flip persists across tier boundaries so a chosen phase carries
    # forward through the day.

  inkplate_sonos_playlist_index:
    name: Sonos playlist cursor (0-based index into the cold-start pool)
    min: 0
    # Bumped manually if the playlist list in sonos_remote.yaml grows beyond
    # 8 entries. The dots automations clamp via modulo so an out-of-range
    # value wraps cleanly.
    max: 31
    step: 1
    initial: 0
    # Persists current cursor into the playlist pool so the remote's dot
    # buttons step deterministically (dot-1 = previous, dot-2 = next) and
    # so play/pause from idle starts from a known position rather than
    # random. Wraps with modulo against the in-YAML pool length.

input_boolean:
  inkplate_publisher_enabled:
    name: Inkplate renderer-input publisher
    initial: true
    # Master kill-switch for the five renderer-input publishers (clock, weather,
    # climate, hn, device). Toggle off to halt POSTs to the renderer without
    # touching the automations; the renderer keeps serving from whatever files
    # are currently on disk.

timer:
  inkplate_now_playing_linger:
    duration: "00:01:30"
