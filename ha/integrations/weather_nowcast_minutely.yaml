# 1-minute-resolution nowcast — OpenWeatherMap OneCall 3.0 `minutely`.
#
# MET.no's hourly forecast (ha/integrations/weather_nowcast.yaml) gives
# coarse "rain in ~Nh" labels from 1-hour buckets. OWM OneCall 3.0's
# `minutely` array yields a rolling 60-minute window at 1-minute
# resolution, radar-augmented where coverage exists. This integration
# replaces the earlier Open-Meteo minutely_15 feed (which gave 15-min
# bucket resolution without an API key) now that we have an OWM key.
#
# Combined with the hourly fallback this gives:
#   0-60 min horizon: 1-min precision from OWM
#   1h-6h horizon:    1h precision from MET.no (unchanged)
#
# Label semantics (0-60 min only — beyond that the hourly fallback
# produced by weather_nowcast.yaml takes over):
#   • "RAIN NOW"           — precipitation in the current 1-min bucket
#   • "RAIN IN N MIN"      — first wet bucket is N minutes from now
#   • "CLEARING IN N MIN"  — currently raining, first dry bucket in N min
#   • empty                — no change within 60 min (fall through to hourly)
#
# Threshold: precipitation ≥ 0.1 mm/h counts as wet. OWM reports
# `precipitation` as mm/h averaged over each 1-min bucket.
#
# API docs: https://openweathermap.org/api/one-call-3. Scan interval 300 s
# (5 min) gives fresh data every 5 min with a 60-min horizon — ample. Two
# locations × 12/hr × 24 = 576 calls/day, under the free-tier 1000/day.

rest:
  - scan_interval: 300      # 5 min
    resource: https://api.openweathermap.org/data/3.0/onecall
    params:
      lat: !secret ${PLACE_A_SLUG}_latitude
      lon: !secret ${PLACE_A_SLUG}_longitude
      appid: !secret openweathermap_api_key
      exclude: "current,hourly,daily,alerts"
      units: metric
    timeout: 20
    sensor:
      - name: ${PLACE_A_SLUG}_owm_minutely
        unique_id: ${PLACE_A_SLUG}_owm_minutely
        # State is a short marker; the 60-entry minutely array is copied
        # into attributes for the template sensors below to walk.
        value_template: >-
          {% set m = value_json.minutely | default([]) %}
          {{ 'ok:' ~ (m | length) if m else 'empty' }}
        json_attributes:
          - minutely

  - scan_interval: 300
    resource: https://api.openweathermap.org/data/3.0/onecall
    params:
      lat: !secret ${PLACE_B_SLUG}_latitude
      lon: !secret ${PLACE_B_SLUG}_longitude
      appid: !secret openweathermap_api_key
      exclude: "current,hourly,daily,alerts"
      units: metric
    timeout: 20
    sensor:
      - name: ${PLACE_B_SLUG}_owm_minutely
        unique_id: ${PLACE_B_SLUG}_owm_minutely
        value_template: >-
          {% set m = value_json.minutely | default([]) %}
          {{ 'ok:' ~ (m | length) if m else 'empty' }}
        json_attributes:
          - minutely

# Parser + combiner. Two derived sensors per location:
#   *_nowcast_minutely_label   — short string, 0-60 min horizon only
#   *_nowcast_minutely_minutes — minutes until next state change (-1 if no
#                                change in 60-min window or API offline)
# Plus the combined outputs that publish_inputs.yaml reads:
#   *_nowcast_label / *_nowcast_minutes — prefer minutely when it has a
#   predicted change; else fall back to the hourly sensors produced by
#   weather_nowcast.yaml (`*_nowcast_hourly_label` / `*_nowcast_hourly_minutes`).
template:
  - sensor:
      # ---------- ${PLACE_A_NAME} ----------
      - name: ${PLACE_A_SLUG}_nowcast_minutely_label
        unique_id: ${PLACE_A_SLUG}_nowcast_minutely_label
        state: >-
          {% set m = state_attr('sensor.${PLACE_A_SLUG}_owm_minutely','minutely') or [] %}
          {% set ns = namespace(first_wet=-1, first_dry=-1) %}
          {% for b in m[:60] %}
            {% set wet = (b.precipitation | float(0)) >= 0.1 %}
            {% if wet and ns.first_wet < 0 %}{% set ns.first_wet = loop.index0 %}{% endif %}
            {% if (not wet) and ns.first_dry < 0 %}{% set ns.first_dry = loop.index0 %}{% endif %}
          {% endfor %}
          {%- if m | length == 0 -%}
          {%- elif ns.first_wet == 0 and ns.first_dry > 0 -%}
            CLEARING IN {{ ns.first_dry }} MIN
          {%- elif ns.first_wet == 0 -%}
            RAIN NOW
          {%- elif ns.first_wet > 0 -%}
            RAIN IN {{ ns.first_wet }} MIN
          {%- endif %}

      - name: ${PLACE_A_SLUG}_nowcast_minutely_minutes
        unique_id: ${PLACE_A_SLUG}_nowcast_minutely_minutes
        unit_of_measurement: min
        state: >-
          {% set m = state_attr('sensor.${PLACE_A_SLUG}_owm_minutely','minutely') or [] %}
          {% set ns = namespace(first_wet=-1, first_dry=-1) %}
          {% for b in m[:60] %}
            {% set wet = (b.precipitation | float(0)) >= 0.1 %}
            {% if wet and ns.first_wet < 0 %}{% set ns.first_wet = loop.index0 %}{% endif %}
            {% if (not wet) and ns.first_dry < 0 %}{% set ns.first_dry = loop.index0 %}{% endif %}
          {% endfor %}
          {%- if ns.first_wet == 0 and ns.first_dry > 0 -%}
            {{ ns.first_dry }}
          {%- elif ns.first_wet > 0 -%}
            {{ ns.first_wet }}
          {%- else -%}
            -1
          {%- endif %}

      # Combined label: prefer minutely when it has a meaningful prediction
      # (change within 60 min), else fall through to the hourly sensor.
      - name: ${PLACE_A_SLUG}_nowcast_label
        unique_id: ${PLACE_A_SLUG}_nowcast_label_combined
        state: >-
          {% set mm = states('sensor.${PLACE_A_SLUG}_nowcast_minutely_label') %}
          {%- if mm not in ['unknown','unavailable','',none] -%}
            {{ mm }}
          {%- else -%}
            {{ states('sensor.${PLACE_A_SLUG}_nowcast_hourly_label') }}
          {%- endif %}

      - name: ${PLACE_A_SLUG}_nowcast_minutes
        unique_id: ${PLACE_A_SLUG}_nowcast_minutes_combined
        unit_of_measurement: min
        state: >-
          {% set mm = states('sensor.${PLACE_A_SLUG}_nowcast_minutely_minutes') | int(-1) %}
          {%- if mm > 0 -%}
            {{ mm }}
          {%- else -%}
            {{ states('sensor.${PLACE_A_SLUG}_nowcast_hourly_minutes') | int(-1) }}
          {%- endif %}

      # ---------- ${PLACE_B_NAME} ----------
      - name: ${PLACE_B_SLUG}_nowcast_minutely_label
        unique_id: ${PLACE_B_SLUG}_nowcast_minutely_label
        state: >-
          {% set m = state_attr('sensor.${PLACE_B_SLUG}_owm_minutely','minutely') or [] %}
          {% set ns = namespace(first_wet=-1, first_dry=-1) %}
          {% for b in m[:60] %}
            {% set wet = (b.precipitation | float(0)) >= 0.1 %}
            {% if wet and ns.first_wet < 0 %}{% set ns.first_wet = loop.index0 %}{% endif %}
            {% if (not wet) and ns.first_dry < 0 %}{% set ns.first_dry = loop.index0 %}{% endif %}
          {% endfor %}
          {%- if m | length == 0 -%}
          {%- elif ns.first_wet == 0 and ns.first_dry > 0 -%}
            CLEARING IN {{ ns.first_dry }} MIN
          {%- elif ns.first_wet == 0 -%}
            RAIN NOW
          {%- elif ns.first_wet > 0 -%}
            RAIN IN {{ ns.first_wet }} MIN
          {%- endif %}

      - name: ${PLACE_B_SLUG}_nowcast_minutely_minutes
        unique_id: ${PLACE_B_SLUG}_nowcast_minutely_minutes
        unit_of_measurement: min
        state: >-
          {% set m = state_attr('sensor.${PLACE_B_SLUG}_owm_minutely','minutely') or [] %}
          {% set ns = namespace(first_wet=-1, first_dry=-1) %}
          {% for b in m[:60] %}
            {% set wet = (b.precipitation | float(0)) >= 0.1 %}
            {% if wet and ns.first_wet < 0 %}{% set ns.first_wet = loop.index0 %}{% endif %}
            {% if (not wet) and ns.first_dry < 0 %}{% set ns.first_dry = loop.index0 %}{% endif %}
          {% endfor %}
          {%- if ns.first_wet == 0 and ns.first_dry > 0 -%}
            {{ ns.first_dry }}
          {%- elif ns.first_wet > 0 -%}
            {{ ns.first_wet }}
          {%- else -%}
            -1
          {%- endif %}

      - name: ${PLACE_B_SLUG}_nowcast_label
        unique_id: ${PLACE_B_SLUG}_nowcast_label_combined
        state: >-
          {% set mm = states('sensor.${PLACE_B_SLUG}_nowcast_minutely_label') %}
          {%- if mm not in ['unknown','unavailable','',none] -%}
            {{ mm }}
          {%- else -%}
            {{ states('sensor.${PLACE_B_SLUG}_nowcast_hourly_label') }}
          {%- endif %}

      - name: ${PLACE_B_SLUG}_nowcast_minutes
        unique_id: ${PLACE_B_SLUG}_nowcast_minutes_combined
        unit_of_measurement: min
        state: >-
          {% set mm = states('sensor.${PLACE_B_SLUG}_nowcast_minutely_minutes') | int(-1) %}
          {%- if mm > 0 -%}
            {{ mm }}
          {%- else -%}
            {{ states('sensor.${PLACE_B_SLUG}_nowcast_hourly_minutes') | int(-1) }}
          {%- endif %}
