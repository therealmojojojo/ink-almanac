  - "A bright, loud dark."
  - "Storm on the horizon."
  - "Thunder and rain."
  - "A night of weather."
  - "Lightning to the east."
  - "The sky is arguing."
  - "Thunder, then rain."

snow:
  - "Snow by morning."
  - "Snow at the sill."
  - "A slow, white hour."
  - "Snow under streetlight."
  - "Quiet snow, quiet dark."
  - "Snow, nothing else."
  - "Snow keeps falling."
  - "Soft snow, no sound."

sleet:         # snowy-rainy
  - "Rain turning to snow."
  - "Neither rain nor snow."
  - "A cold, grey wet."
  - "Sleet on the pavement."
  - "Half snow, half rain."
  - "A sharp wet hour."
  - "Sleet to the glass."
  - "Cold has it both ways."

# --- wind-only --------------------------------------------------------------

windy_dry:     # windy / windy-variant, no precipitation
  - "Wind along the eaves."
  - "A dry, moving night."
  - "Wind in the courtyard."
  - "The night is walking."
  - "Wind through the wires."
  - "A restless dark."
  - "The wind has arrived."
  - "Dry wind, dark hour."
