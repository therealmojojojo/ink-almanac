# Curated pool for the Night-mode poetic weather line.
#
# The hourly automation (ha/automations/poetic_weather.yaml) computes a bucket
# from the current weather state and asks generate_poetic_weather_line.sh to
# render a line.
#
# When an Anthropic API key is configured, the script attempts an LLM call
# first and falls back to this pool on any failure or rejection. When no key
# is set, the script goes straight to the pool. Bucket-not-in-pool falls back
# to `cloudy`, then to the hardcoded "Quiet night." safety string.
#
# Rules for every line:
#   * ≤ 32 graphemes (including punctuation)
#   * ASCII + Romanian diacritics only (ĂÂÎȘȚăâîșț); no emoji, no em-dash, no curly quotes
#   * End with a period or no punctuation
#   * House voice: plain, observational, slightly melancholy; avoid clever-clever

# --- clear sky --------------------------------------------------------------

clear_cold:    # clear + ≤ 5°C
  - "Clear, quiet night."
  - "Cold, still sky."
  - "Stars over frost."
  - "A sharp, hushed dark."
  - "Ice-quiet night."
  - "Cold stars, no wind."
  - "The frost keeps watch."
  - "Hard cold, clear stars."

clear_mild:    # clear + 6–18°C
  - "Clear, mild night."
  - "A soft open sky."
  - "Calm dark, mild air."
  - "The night settles easy."
  - "Stars, little wind."
  - "A mild, open hour."
  - "Clear and kind."
  - "The dark is mild."

clear_warm:    # clear + ≥ 19°C (summer night)
  - "Warm night, clear stars."
  - "A summer dark."
  - "Soft air, bright stars."
  - "Stars on a warm night."
  - "The heat has settled."
  - "Open sky, easy air."
  - "Warm and starred."
  - "A loose, warm hour."

# --- clouds -----------------------------------------------------------------

partly_cloudy:
  - "Stars through scattered cloud."
  - "A half-lit sky."
  - "Cloud and star, uneven."
  - "Passing clouds."
  - "Patches of dark and bright."
  - "A half-open sky."
  - "Broken clouds, quiet air."
  - "Moving clouds, still street."

cloudy:        # cloudy / overcast + ≥ 6°C
  - "Heavy sky, quiet street."
  - "Low cloud, still hour."
  - "A muffled night."
  - "Clouds sit on the roof."
  - "Soft cloud, no stars."
  - "A closed, quiet night."
  - "Covered sky."
  - "The cloud holds."

cloudy_cold:   # cloudy + ≤ 5°C
  - "Cold cloud, no stars."
  - "A slate-grey night."
  - "Night under low cloud."
  - "Cold, closed sky."
  - "Thick cloud, sharp air."
  - "A pressed-down dark."
  - "Frost under cover."
  - "Cold and overhung."

# --- reduced visibility / precipitation -------------------------------------

