  - "A grey, close night."
  - "Fog along the road."
  - "The air has thickened."
  - "Soft grey, soft dark."
  - "Fog without wind."
  - "A silent fog."
  - "The world is nearer."

drizzle:       # light rain; manually-set bucket
  - "Light rain, steady."
  - "A fine, wet dark."
  - "Drizzle on the pane."
  - "Thin rain, no sound."
  - "The rain is half-spoken."
  - "A mild wet night."
  - "Drizzle, steady breath."
  - "Small rain, small wind."

rain:          # steady rain
  - "Rain on the windows."
  - "Steady rain tonight."
  - "Rain along the street."
  - "Night of falling rain."
  - "Rain, and rain again."
  - "The rain keeps time."
  - "A wet, walking night."
  - "Rain to the eaves."

pouring:       # heavy rain
  - "Rain by the bucket."
  - "A loud, wet dark."
  - "The rain is furious."
  - "Hard rain on the glass."
  - "Rain louder than thought."
  - "A drowned hour."
  - "Rain without pause."
  - "The sky is pouring."

thunderstorm:  # lightning, lightning-rainy, hail, exceptional
