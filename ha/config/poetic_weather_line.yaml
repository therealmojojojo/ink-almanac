# Poetic-weather-line configuration.
#
# provider : "claude" (cloud, default) or "ollama" (local).
# model    : provider-specific model id.
# cache_file : where the line is written (VM path).
# renderer_url : optional — renderer fetches this over HTTP; if unset the Mac host
#   reads the file from a shared path.

provider: claude
model: claude-haiku-4-5-20251001
cache_file: /config/custom/inkplate/state/poetic_weather.txt
renderer_url: http://renderer.local:8575/state/poetic_weather

# Weather buckets used for selecting a fallback line when LLM output is rejected.
# The hourly automation computes the bucket from the current weather entity before
# invoking the shell_command.
bucket_rules:
  clear_cold:    { condition_in: [clear, sunny], temp_c_max: 5 }
  clear_mild:    { condition_in: [clear, sunny], temp_c_min: 6 }
  rain:          { condition_in: [rainy, pouring, lightning-rainy] }
  snow:          { condition_in: [snowy, snowy-rainy] }
  wind:          { condition_in: [windy, windy-variant] }
  cloudy:        { condition_in: [cloudy, partlycloudy, fog, hazy] }
  overcast_warm: { condition_in: [overcast], temp_c_min: 10 }
  overcast_cold: { condition_in: [overcast], temp_c_max: 9 }
