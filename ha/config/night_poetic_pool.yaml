# Curated pool for the Night-mode poetic weather line — the sole source.
#
# The automation `ha/automations/poetic_weather.yaml` watches
# `sensor.inkplate_night_poetic_bucket` and, on every bucket change, asks
# `ha/scripts/generate_poetic_weather_line.sh` to pick a random line from
# the matching bucket below and write it to `state/poetic_weather.txt`.
# The renderer reads that text via the `inkplate_poetic_weather_line`
# command_line sensor and bakes it into the Night PNG.
#
# History: this file used to be a fallback for an hourly Claude Haiku
# call that generated short observational lines. The LLM occasionally
# produced Romanian with misspellings, and the pool's coverage and voice
# were strong enough to stand on their own. `add-night-text-clock-
# partials` (2026-05-20) removed the LLM, renamed the file from
# `night_fallback_lines.yaml` to its current name, and made the pool the
# only path. Bucket-not-in-pool falls back to `cloudy`, then to the
# hardcoded "Quiet night." safety string inside the picker script.
#
# Rules for every line:
#   * ≤ 40 graphemes (including punctuation)
#   * ASCII only: `[A-Za-z0-9 ,.:;!\-'"]+`. No Romanian diacritics, no
#     em-dash, no curly quotes, no emoji.
#   * End with a period or no punctuation
#   * House voice: plain, observational, slightly melancholy; avoid
#     clever-clever
#
# Add lines by appending to the relevant bucket. Buckets currently hold
# 8 entries each; growing to 12-15 reduces visible repetition across
# multi-night stretches of stable weather.

# --- clear sky --------------------------------------------------------------

clear_cold:    # clear + ≤ 5°C
  - "Clear, quiet night."
  - "Cold, still sky."
  - "Stars over frost."
  - "A sharp, hushed dark."
  - "Ice-quiet night."
  - "Cold stars, no wind."
  - "The frost keeps watch."
  - "Hard cold, clear stars."

clear_mild:    # clear + 6–18°C
  - "Clear, mild night."
  - "A soft open sky."
  - "Calm dark, mild air."
  - "The night settles easy."
  - "Stars, little wind."
  - "A mild, open hour."
  - "Clear and kind."
  - "The dark is mild."

clear_warm:    # clear + ≥ 19°C (summer night)
  - "Warm night, clear stars."
  - "A summer dark."
  - "Soft air, bright stars."
  - "Stars on a warm night."
  - "The heat has settled."
  - "Open sky, easy air."
  - "Warm and starred."
  - "A loose, warm hour."

