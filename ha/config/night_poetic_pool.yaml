  - "A half-lit sky."
  - "Cloud and star, uneven."
  - "Passing clouds."
  - "Patches of dark and bright."
  - "A half-open sky."
  - "Broken clouds, quiet air."
  - "Moving clouds, still street."

cloudy:        # cloudy / overcast + ≥ 6°C
  - "Heavy sky, quiet street."
  - "Low cloud, still hour."
  - "A muffled night."
  - "Clouds sit on the roof."
  - "Soft cloud, no stars."
  - "A closed, quiet night."
  - "Covered sky."
  - "The cloud holds."

cloudy_cold:   # cloudy + ≤ 5°C
  - "Cold cloud, no stars."
  - "A slate-grey night."
  - "Night under low cloud."
  - "Cold, closed sky."
  - "Thick cloud, sharp air."
  - "A pressed-down dark."
  - "Frost under cover."
  - "Cold and overhung."

