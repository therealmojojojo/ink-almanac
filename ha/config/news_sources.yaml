# Per-source RSS/JSON sensors. Regenerate the sensor list after editing:
#   python3 ha/scripts/generate_news_sensors.py
# deploy.sh calls this automatically before rsync.
#
# Schema:
#   name           : sensor-safe identifier (becomes sensor.news_<name>)
#   url            : feed URL (RSS/Atom) or JSON endpoint
#   shape          : "rss" (default) or "json"
#   json_path      : dotted path to the list of items (shape=json only)
#   max_items      : cap (default 5)
#   scan_interval  : seconds (default 1800)
#
# The Summary face's Smart pill is NOT fed from this file. It comes from
# sensor.inkplate_curated_news, which ha/scripts/generate_curated_news.sh
# writes daily: a word-of-the-day extracted from the day's companion text
# + an on-this-day historical event, both picked by Claude. The RSS feeds
# below are exposed as per-source sensors for operators who want to wire
# them into a custom view; they are unused by default.

sources:
  - name: digi24
    url: https://www.digi24.ro/rss
    shape: rss
    max_items: 5
    scan_interval: 1800

  - name: hotnews
    url: https://hotnews.ro/feed
    shape: rss
    max_items: 5
    scan_interval: 1800
