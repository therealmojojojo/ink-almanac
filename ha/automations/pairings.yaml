# Sunday 23:30: run `corpus pair generate-week` on the renderer host via shell_command.
# Reports success (with the generated date range) or failure (with exit code).

- id: inkplate_pairings_sunday_generate
  alias: "Inkplate: Sunday 23:30 — generate next week's pairings"
  trigger:
    - platform: time
      at: "23:30:00"
  condition:
    - condition: time
      weekday: [sun]
  action:
    - service: shell_command.generate_pairings_week
      response_variable: pairings_result
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pairings_result.returncode == 0 }}"
          sequence:
            - service: notify.inkplate_operator
              data:
                title: "Pairings ready"
                message: >-
                  Generated next week of pairings ({{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}
                  → {{ (now() + timedelta(days=7)).strftime('%Y-%m-%d') }}).
      default:
        - service: notify.inkplate_operator
          data:
            title: "Pairings generation FAILED"
            message: >-
              Return code {{ pairings_result.returncode }}.
              stderr: {{ pairings_result.stderr | default('(empty)') }}
