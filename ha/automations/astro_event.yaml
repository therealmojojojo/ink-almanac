# Daily Stars-cell statement generation for the Weather face.
#
# Fires at 07:00 local so the cell is correct for the *upcoming* night
# from breakfast onward (the prior 17:00 schedule meant the panel showed
# yesterday's "tonight" line all morning and afternoon).
#
# Sourced from real ephemerides (Skyfield + DE421) plus Launch Library 2
# upcoming launches and Spaceflight Now / NASASpaceflight RSS, with Haiku
# acting only as a phrasing layer. See:
#   - openspec/changes/add-grounded-stars-cell/proposal.md
#   - ha/scripts/generate_astro_event.py

- id: inkplate_astro_event_daily
  alias: "Inkplate: Stars-cell statement daily"
  trigger:
    - platform: time
      at: "07:00:00"
    - platform: homeassistant
      event: start
  variables:
    lat: !secret ${PLACE_A_SLUG}_latitude
    lon: !secret ${PLACE_A_SLUG}_longitude
    tz_offset: "{{ (now().utcoffset().total_seconds() / 3600) | int }}"
  action:
    - service: shell_command.generate_astro_event
      data:
        lat: "{{ lat }}"
        lon: "{{ lon }}"
        tz_offset: "{{ tz_offset }}"
