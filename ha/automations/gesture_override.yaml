# Gesture handler — turns device-published taps into override-state changes.
#
# Device contract (from add-local-clock-tick "Tap detection"):
#   - Device publishes {"kind":"single"|"double"} on `inkplate/state/gesture`.
#   - Device is waiting up to ~2 s for an updated retained `active_mode`, then
#     fetches whichever face the retained value points to.
#   - Device does NOT interpret gestures; HA is authoritative.
#
# Activation model:
#   Explicit (tap) beats ambient (schedule, music). On the wire-tied frame
#   mount, the LSM6DSO's tap classification is unreliable — a firm tap rings
#   the frame and latches `double` (two shocks within 350 ms), while a softer
#   tap latches only `single`. Distinguishing the two would force the
#   operator to calibrate their tap force, so we treat both kinds as the
#   same intent. Both `single` and `double` MQTT payloads run the same
#   automation actions.
#
# Rules:
#   - Gestures are SUPPRESSED during quiet hours.
#   - Tap during the schedule (Summary/Gallery/Weather slot) → flip the
#     alternation offset. The currently-shown face swaps to its counterpart
#     and the flipped phase persists across subsequent ticks until tapped
#     again.
#   - Tap during Night → no-op (no main face to swap to).
#   - Tap during now_playing → peek to the tier's main face (Summary or
#     Gallery) for ~60 s, then revert to now_playing.
#   - Tap during weather_peek (legacy) → handled by the legacy single-tap
#     re-arm path above (kept defensively — nothing creates weather_peek
#     under the current design but a stale retained MQTT state could).
#
# Compared to the previous design: the dedicated single-tap → weather_peek
# automation is removed because the new alternation engine cycles Weather
# in naturally (every 15-30 min depending on tier), making the explicit
# 5-min peek redundant. The `weather_peek` state value still lives in the
# helpers and the expiry / HA-start cleanup automations are kept as a safety
# net for any operator-initiated peek (e.g. via a dashboard button) and to
# survive an HA restart mid-peek with retained MQTT state.
#
# Tap-to-face-change latency target: < 2 s (the device's grace window). MQTT
# publish in the same action block is sub-second in a healthy HA, so this is
# comfortable.

# NOTE: the dedicated single-tap → weather_peek automation has been removed.
# Both `single` and `double` MQTT payloads now drive the two automations
# below (phase flip during schedule, peek during now_playing). The new
# alternation engine surfaces Weather every 15-30 min on its own, so the
# 5-min peek window is no longer needed.

# Tap during the schedule: flip the alternation phase. Triggers on either
# kind (single OR double) — the wire-tied frame mount can latch either,
# depending on tap force, and we treat them as the same intent.
- id: inkplate_gesture_tap_phase_flip
  alias: "Inkplate: tap (schedule) → flip alternation phase"
  mode: queued
  max: 3
  trigger:
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "double"
      value_template: "{{ value_json.kind }}"
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "single"
      value_template: "{{ value_json.kind }}"
  condition:
    # Quiet-hours guard.
    - condition: template
      value_template: >-
        {% set qs = states('input_datetime.inkplate_quiet_start') %}
        {% set qe = states('input_datetime.inkplate_quiet_end') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if qs <= qe %}
          {{ not (qs <= now_t < qe) }}
        {% else %}
          {{ not (now_t >= qs or now_t < qe) }}
        {% endif %}
    # Only when the schedule owns the panel (not now_playing, not peek).
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: schedule
    # Night has no alternation — taps in Night are no-ops.
    - condition: template
      value_template: >-
        {% set m = now().hour * 60 + now().minute %}
        {{ not (m >= 22*60 or m < 6*60 + 30) }}
  action:
    # Compute the new offset (0↔1) and the resulting alternated face. Same
    # formula as schedule.yaml's alternation tick — kept inline because Jinja
    # macros aren't shared across HA's flat automation list.
    - variables:
        minute_of_day: "{{ now().hour * 60 + now().minute }}"
        new_offset: "{{ 1 - (states('input_number.inkplate_alternation_offset') | int(0)) }}"
        target: >-
          {% set m = minute_of_day | int %}
          {% if m < 10*60 %}
            {% set tier_start = 6*60 + 30 %}
            {% set tier_full = 15 %}
            {% set tier_main = 'summary' %}
          {% elif m < 17*60 %}
            {% set tier_start = 10*60 %}
            {% set tier_full = 30 %}
            {% set tier_main = 'gallery' %}
          {% else %}
            {% set tier_start = 17*60 %}
            {% set tier_full = 15 %}
            {% set tier_main = 'gallery' %}
          {% endif %}
          {% set parity = (((m - tier_start) // tier_full) + (new_offset | int)) % 2 %}
          {% if parity == 0 %}{{ tier_main }}{% else %}weather{% endif %}
        target_face: "{{ target | trim }}"
    - service: input_number.set_value
      target: { entity_id: input_number.inkplate_alternation_offset }
      data: { value: "{{ new_offset }}" }
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_scheduled_face }
      data: { value: "{{ target_face }}" }
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ target_face }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

# Tap during now-playing: peek the tier's main face for ~60 s, then revert
# to now-playing. Triggers on either kind (single OR double).
- id: inkplate_gesture_tap_now_playing_peek
  alias: "Inkplate: tap (now-playing) → peek to tier main for 60 s"
  # `restart` so a second tap during the peek resets the 60-s timer rather
  # than queueing a stale follow-up revert.
  mode: restart
  trigger:
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "double"
      value_template: "{{ value_json.kind }}"
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "single"
      value_template: "{{ value_json.kind }}"
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: now_playing
    - condition: template
      value_template: >-
        {% set qs = states('input_datetime.inkplate_quiet_start') %}
        {% set qe = states('input_datetime.inkplate_quiet_end') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if qs <= qe %}
          {{ not (qs <= now_t < qe) }}
        {% else %}
          {{ not (now_t >= qs or now_t < qe) }}
        {% endif %}
    # Only peek to a real face — Night has no main worth peeking to.
    - condition: template
      value_template: >-
        {% set m = now().hour * 60 + now().minute %}
        {{ not (m >= 22*60 or m < 6*60 + 30) }}
  action:
    - variables:
        # Peek target is the TIER MAIN, not the alternated face — the user
        # explicitly wants Summary/Gallery during now-playing peek, not the
        # Weather-alternated current schedule.
        peek_face: >-
          {% set m = now().hour * 60 + now().minute %}
          {% if m < 10*60 %}summary
          {% elif m < 22*60 %}gallery
          {% else %}gallery{% endif %}
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ peek_face | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false
    # Hold the peek for ~60 s — matches the device's now-playing 1-min Full
    # cadence so the peek shows for exactly one full-draw window.
    - delay: "00:01:00"
    # Defensive: if Sonos has already stopped (override flipped to schedule
    # via linger expiry) during the delay, don't republish now-playing.
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: now_playing
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: now-playing
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

- id: inkplate_weather_peek_expiry
  alias: "Inkplate: Weather-peek window expired → revert"
  # Fires when the wall clock matches the helper's datetime. Reverts only if
  # weather_peek is still the active override (a higher-precedence activation —
  # now_playing — may have superseded it in the meantime).
  trigger:
    - platform: time
      at: input_datetime.inkplate_weather_peek_expires_at
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: weather_peek
  action:
    # Unified restore cascade — also reused by the linger-expired and HA-start
    # cleanup handlers. Selection rule:
    #   prior == now_playing AND Sonos playing         → now_playing
    #   prior == weather_peek AND expiry still future  → weather_peek   (peek-inside-peek edge)
    #   prior == summary_gallery_toggle AND in-window  → summary_gallery_toggle
    #   else                                           → schedule
    - variables:
        prior: "{{ states('input_text.inkplate_prior_override') }}"
        peek_expires: "{{ states('input_datetime.inkplate_weather_peek_expires_at') | default('', true) }}"
        sched: "{{ states('input_text.inkplate_scheduled_face') }}"
        sonos_playing: "{{ states('media_player.kitchen_sonos') == 'playing' }}"
        restore: >-
          {% if prior == 'now_playing' and sonos_playing %}
            now_playing
          {% elif prior == 'weather_peek' and peek_expires and as_timestamp(peek_expires, 0) > as_timestamp(now()) %}
            weather_peek
          {% elif prior == 'summary_gallery_toggle' %}
            summary_gallery_toggle
          {% else %}
            schedule
          {% endif %}
        restore_mode: >-
          {% set r = (
            'now_playing' if (prior == 'now_playing' and sonos_playing)
            else ('weather_peek' if (prior == 'weather_peek' and peek_expires and as_timestamp(peek_expires, 0) > as_timestamp(now()))
            else ('summary_gallery_toggle' if prior == 'summary_gallery_toggle'
            else 'schedule'))
          ) %}
          {% if r == 'now_playing' %}now-playing
          {% elif r == 'weather_peek' %}weather
          {% else %}{{ sched }}{% endif %}
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_active_override }
      data: { value: "{{ restore | trim }}" }
    # Cascade consumes prior_override. Reset to `schedule` so the invariant
    # (prior != active) holds and future activations save a clean prior.
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_prior_override }
      data: { value: schedule }
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ restore_mode | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

- id: inkplate_ha_start_stale_peek_cleanup
  alias: "Inkplate: HA start — clear expired weather-peek override"
  # HA time triggers don't back-fire for times already in the past. If HA
  # restarts mid-peek and the expiry has passed, the peek would be stuck
  # forever. At startup, if we're in weather_peek with an expired datetime,
  # run the same restore cascade as the normal expiry path would have.
  trigger:
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: weather_peek
    - condition: template
      value_template: >-
        {% set e = states('input_datetime.inkplate_weather_peek_expires_at') %}
        {{ e and as_timestamp(e, 0) <= as_timestamp(now()) }}
  action:
    - variables:
        prior: "{{ states('input_text.inkplate_prior_override') }}"
        sched: "{{ states('input_text.inkplate_scheduled_face') }}"
        sonos_playing: "{{ states('media_player.kitchen_sonos') == 'playing' }}"
        restore: >-
          {% if prior == 'now_playing' and sonos_playing %}
            now_playing
          {% elif prior == 'summary_gallery_toggle' %}
            summary_gallery_toggle
          {% else %}
            schedule
          {% endif %}
        restore_mode: >-
          {% if prior == 'now_playing' and sonos_playing %}now-playing
          {% else %}{{ sched }}{% endif %}
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_active_override }
      data: { value: "{{ restore | trim }}" }
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_prior_override }
      data: { value: schedule }
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ restore_mode | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false
