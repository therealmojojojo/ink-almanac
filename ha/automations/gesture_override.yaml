# Gesture handler — turns device-published taps into override-state changes.
#
# Device contract (from add-local-clock-tick "Tap detection"):
#   - Device publishes {"kind":"single"|"double"} on `inkplate/state/gesture`.
#   - Device is waiting up to ~2 s for an updated retained `active_mode`, then
#     fetches whichever face the retained value points to.
#   - Device does NOT interpret gestures; HA is authoritative.
#
# Activation model:
#   Explicit (tap) beats ambient (schedule, music). On the wire-tied frame
#   mount, the LSM6DSO's tap classification is unreliable — a firm tap rings
#   the frame and latches `double` (two shocks within 350 ms), while a softer
#   tap latches only `single`. Distinguishing the two would force the
#   operator to calibrate their tap force, so we treat both kinds as the
#   same intent. Both `single` and `double` MQTT payloads run the same
#   automation actions.
#
# Rules:
#   - Gestures are SUPPRESSED during quiet hours.
#   - Tap during the schedule (Summary/Gallery/Weather slot) → flip the
#     currently-displayed face (read from the commanded-face mirror
#     sensor) to its counterpart. The next /15 schedule tick republishes
#     the schedule's a priori target, overwriting whatever the tap
#     produced — so a tap is a transient peek/toggle lasting up to one
#     Full interval (15 min Morning/Evening, 30 min Midday). Repeat-tap
#     toggles back and forth.
#   - Tap during Night → no-op (no main face to swap to).
#   - Tap during now_playing → peek to the tier's main face (Summary or
#     Gallery) for ~60 s, then revert to now_playing.
#   - Tap during weather_peek (legacy) → handled by the legacy single-tap
#     re-arm path above (kept defensively — nothing creates weather_peek
#     under the current design but a stale retained MQTT state could).
#
# Why the schedule-tap is now a transient peek rather than a phase flip:
# under the 3:1 alternation (`% 4`), an offset toggle 0↔1 only crosses the
# main↔weather boundary on 2 of 4 slots — half the taps would leave the
# face unchanged. Publishing the opposite face directly guarantees every
# tap produces a visible change.
#
# Compared to the previous design: the dedicated single-tap → weather_peek
# automation is removed because the new alternation engine cycles Weather
# in naturally (every 60-150 min depending on tier), making the explicit
# 5-min peek redundant. The `weather_peek` state value still lives in the
# helpers and the expiry / HA-start cleanup automations are kept as a safety
# net for any operator-initiated peek (e.g. via a dashboard button) and to
# survive an HA restart mid-peek with retained MQTT state.
#
# Tap-to-face-change latency target: < 2 s (the device's grace window). MQTT
# publish in the same action block is sub-second in a healthy HA, so this is
# comfortable.

# NOTE: the dedicated single-tap → weather_peek automation has been removed.
# Both `single` and `double` MQTT payloads now drive the two automations
# below (phase flip during schedule, peek during now_playing). The new
# alternation engine surfaces Weather every 15-30 min on its own, so the
# 5-min peek window is no longer needed.

# Tap during the schedule: flip the alternation phase. Triggers on either
# kind (single OR double) — the wire-tied frame mount can latch either,
# depending on tap force, and we treat them as the same intent.
- id: inkplate_gesture_tap_phase_flip
  alias: "Inkplate: tap (schedule) → flip alternation phase"
  mode: queued
  max: 3
  trigger:
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "double"
      value_template: "{{ value_json.kind }}"
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "single"
      value_template: "{{ value_json.kind }}"
  condition:
    # Quiet-hours guard.
    - condition: template
      value_template: >-
        {% set qs = states('input_datetime.inkplate_quiet_start') %}
        {% set qe = states('input_datetime.inkplate_quiet_end') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if qs <= qe %}
          {{ not (qs <= now_t < qe) }}
        {% else %}
          {{ not (now_t >= qs or now_t < qe) }}
        {% endif %}
    # Only when the schedule owns the panel (not now_playing, not peek).
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: schedule
    # Night has no alternation — taps in Night are no-ops.
    - condition: template
      value_template: >-
        {% set m = now().hour * 60 + now().minute %}
        {{ not (m >= 22*60 or m < 6*60 + 30) }}
  action:
    # Flip the currently-DISPLAYED face (read from the commanded-face mirror
    # sensor) to its counterpart and publish. We do NOT touch
    # `inkplate_alternation_offset` or `inkplate_scheduled_face` — the next
    # /15 schedule tick republishes the schedule's a priori target,
    # overwriting whatever the tap produced. So a tap shows the opposite
    # face for at most one Full interval (15 min Morning/Evening, 30 min
    # Midday) before the schedule's natural rhythm resumes.
    #
    # Why read from the mirror sensor instead of recomputing the schedule's
    # parity: after a prior tap in the same slot, the displayed face and
    # the schedule's view disagree. Flipping relative to the schedule
    # would re-publish the same opposite face (no visible change). Flipping
    # relative to the displayed face guarantees every tap toggles. If the
    # sensor is unavailable (broker hiccup at startup), fall back to the
    # schedule's parity so the tap still does *something* sensible.
    - variables:
        minute_of_day: "{{ now().hour * 60 + now().minute }}"
        offset: "{{ states('input_number.inkplate_alternation_offset') | int(0) }}"
        tier_main: >-
          {% set m = minute_of_day | int %}
          {% if m < 10*60 %}summary
          {% elif m < 17*60 %}gallery
          {% else %}gallery{% endif %}
        commanded: "{{ states('sensor.inkplate_commanded_face') }}"
        # Resolve current face. Prefer the mirror sensor; fall back to the
        # schedule's natural target if the sensor isn't reporting a face value.
        current_face: >-
          {% set c = commanded %}
          {% if c in ('weather', 'summary', 'gallery') %}
            {{ c }}
          {% else %}
            {% set m = minute_of_day | int %}
            {% if m < 10*60 %}
              {% set tier_start = 6*60 + 30 %}
              {% set tier_full = 15 %}
            {% elif m < 17*60 %}
              {% set tier_start = 10*60 %}
              {% set tier_full = 30 %}
            {% else %}
              {% set tier_start = 17*60 %}
              {% set tier_full = 15 %}
            {% endif %}
            {% set parity = (((m - tier_start) // tier_full) + offset) % 4 %}
            {% if parity == 0 %}weather{% else %}{{ tier_main | trim }}{% endif %}
          {% endif %}
        flip_face: >-
          {% if (current_face | trim) == 'weather' %}{{ tier_main | trim }}
          {% else %}weather{% endif %}
    # Event channel for the in-flight IMU wake's grace window. Non-retained
    # by contract — the firmware's `mqttWaitForMessage` on this topic relies
    # on the broker having nothing to replay on subscribe, so the only way
    # the device sees a payload is via this fresh push. Without this the
    # device's wait would short-circuit on the previous retained
    # active_mode and ignore the flip. See firmware/src/main_loop.cpp
    # around the IMU branch and openspec/specs/device-firmware "tap-driven
    # mode change".
    - service: mqtt.publish
      data:
        topic: inkplate/command/gesture_response
        payload: "{{ flip_face | trim }}"
        retain: false
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ flip_face | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

# Tap during now-playing: peek the tier's main face for ~60 s, then revert
# to now-playing. Triggers on either kind (single OR double).
# Tap during now-playing — split into two automations sharing the same
# trigger but mutually-exclusive on the mirror sensor.
#
# Why split: the device cannot be remotely woken from deep sleep over
# WiFi, so when Sonos starts mid-tier, the screen typically stays on
# whatever the previous tier had drawn until the operator double-taps
# to wake the device. That first wake-tap should land on now-playing
# (the operator wants to see what's playing). Subsequent taps, with
# the screen already on now-playing, are "peek away from music to
# glance at weather" gestures.
#
# Discriminator: `sensor.inkplate_commanded_face` — the truthful mirror
# of the face the device most recently drew (sourced from
# `inkplate/state/device.active_mode`, deployed 2026-05-08). If the
# mirror is anything other than `now-playing`, the screen isn't on
# now-playing yet, and this tap is the wake-up tap. If the mirror is
# `now-playing`, this tap is a peek navigation.
#
# Tap during a peek (mirror = weather): naturally takes the first-wake
# branch and snaps back to now-playing — i.e., tap to peek, tap again
# to come back. The peek's `mode: restart` 60-s timer is still running
# but its eventual revert publishes active_mode=now-playing, already
# retained, so the revert is a no-op.
#
# See openspec/specs/now-playing-override "Tap interaction during
# now-playing" for the canonical spec.

- id: inkplate_gesture_tap_now_playing_first_wake
  alias: "Inkplate: tap (now-playing, screen NOT on now-playing) → confirm now-playing"
  # `single` because this handler is idempotent — multiple taps in the
  # same wake all want the same result. The grace window is short enough
  # (2 s) that queueing isn't a concern.
  mode: single
  trigger:
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "double"
      value_template: "{{ value_json.kind }}"
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "single"
      value_template: "{{ value_json.kind }}"
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: now_playing
    # Mirror disagrees with `now-playing`: this is the first wake of the
    # session (or a tap mid-peek; same outcome). `unavailable` and
    # `unknown` (cold boot) also pass this condition, which is correct —
    # cold boot also wants now-playing.
    - condition: template
      value_template: "{{ states('sensor.inkplate_commanded_face') != 'now-playing' }}"
    # Quiet-hours guard.
    - condition: template
      value_template: >-
        {% set qs = states('input_datetime.inkplate_quiet_start') %}
        {% set qe = states('input_datetime.inkplate_quiet_end') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if qs <= qe %}
          {{ not (qs <= now_t < qe) }}
        {% else %}
          {{ not (now_t >= qs or now_t < qe) }}
        {% endif %}
    # Night-tier window (22:00–06:30) — same as the peek handler. The
    # Sonos-started automation already gates on quiet hours, so an active
    # now_playing override at 02:30 is rare (linger from before quiet
    # hours), but defensive.
    - condition: template
      value_template: >-
        {% set m = now().hour * 60 + now().minute %}
        {{ not (m >= 22*60 or m < 6*60 + 30) }}
  action:
    # Single non-retained publish on the gesture_response event channel
    # so the firmware's IMU grace window picks up the answer fast and
    # draws now-playing. We do NOT publish to active_mode — it's already
    # retained as `now-playing` by the Sonos-started automation. We do
    # NOT publish a wake pulse — the tap already woke the device.
    - service: mqtt.publish
      data:
        topic: inkplate/command/gesture_response
        payload: now-playing
        retain: false

- id: inkplate_gesture_tap_now_playing_peek
  alias: "Inkplate: tap (now-playing, screen on now-playing) → peek to weather for 60 s"
  # `restart` so a second tap during the peek resets the 60-s timer
  # rather than queueing a stale follow-up revert. Not actually
  # reachable in practice — the second tap will be handled by the
  # first-wake automation (mirror is now `weather` once the peek draw
  # lands) — but kept for correctness if the mirror update lags.
  mode: restart
  trigger:
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "double"
      value_template: "{{ value_json.kind }}"
    - platform: mqtt
      topic: inkplate/state/gesture
      payload: "single"
      value_template: "{{ value_json.kind }}"
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: now_playing
    # Mirror == 'now-playing': screen is already on now-playing, so this
    # tap is asking to peek away.
    - condition: state
      entity_id: sensor.inkplate_commanded_face
      state: now-playing
    - condition: template
      value_template: >-
        {% set qs = states('input_datetime.inkplate_quiet_start') %}
        {% set qe = states('input_datetime.inkplate_quiet_end') %}
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% if qs <= qe %}
          {{ not (qs <= now_t < qe) }}
        {% else %}
          {{ not (now_t >= qs or now_t < qe) }}
        {% endif %}
    # Only peek when there's a meaningful target — Night has none.
    - condition: template
      value_template: >-
        {% set m = now().hour * 60 + now().minute %}
        {{ not (m >= 22*60 or m < 6*60 + 30) }}
  action:
    # Peek target is always weather. The original design peeked to the
    # tier main (gallery in midday/evening, summary in morning), but the
    # operator's actual ambient-glance use case is "what's the weather
    # while I'm listening" — gallery items are content for the
    # schedule, not for music-time peeks.
    - service: mqtt.publish
      data:
        topic: inkplate/command/gesture_response
        payload: weather
        retain: false
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: weather
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false
    # Hold the peek for ~60 s — matches the device's now-playing 1-min Full
    # cadence so the peek shows for exactly one full-draw window.
    - delay: "00:01:00"
    # Defensive: if Sonos has already stopped (override flipped to schedule
    # via linger expiry) during the delay, don't republish now-playing.
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: now_playing
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: now-playing
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

- id: inkplate_weather_peek_expiry
  alias: "Inkplate: Weather-peek window expired → revert"
  # Fires when the wall clock matches the helper's datetime. Reverts only if
  # weather_peek is still the active override (a higher-precedence activation —
  # now_playing — may have superseded it in the meantime).
  trigger:
    - platform: time
      at: input_datetime.inkplate_weather_peek_expires_at
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: weather_peek
  action:
    # Unified restore cascade — also reused by the linger-expired and HA-start
    # cleanup handlers. Selection rule:
    #   prior == now_playing AND Sonos playing         → now_playing
    #   prior == weather_peek AND expiry still future  → weather_peek   (peek-inside-peek edge)
    #   prior == summary_gallery_toggle AND in-window  → summary_gallery_toggle
    #   else                                           → schedule
    - variables:
        prior: "{{ states('input_text.inkplate_prior_override') }}"
        peek_expires: "{{ states('input_datetime.inkplate_weather_peek_expires_at') | default('', true) }}"
        sched: "{{ states('input_text.inkplate_scheduled_face') }}"
        sonos_playing: "{{ states('media_player.kitchen_sonos') == 'playing' }}"
        restore: >-
          {% if prior == 'now_playing' and sonos_playing %}
            now_playing
          {% elif prior == 'weather_peek' and peek_expires and as_timestamp(peek_expires, 0) > as_timestamp(now()) %}
            weather_peek
          {% elif prior == 'summary_gallery_toggle' %}
            summary_gallery_toggle
          {% else %}
            schedule
          {% endif %}
        restore_mode: >-
          {% set r = (
            'now_playing' if (prior == 'now_playing' and sonos_playing)
            else ('weather_peek' if (prior == 'weather_peek' and peek_expires and as_timestamp(peek_expires, 0) > as_timestamp(now()))
            else ('summary_gallery_toggle' if prior == 'summary_gallery_toggle'
            else 'schedule'))
          ) %}
          {% if r == 'now_playing' %}now-playing
          {% elif r == 'weather_peek' %}weather
          {% else %}{{ sched }}{% endif %}
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_active_override }
      data: { value: "{{ restore | trim }}" }
    # Cascade consumes prior_override. Reset to `schedule` so the invariant
    # (prior != active) holds and future activations save a clean prior.
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_prior_override }
      data: { value: schedule }
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ restore_mode | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false

- id: inkplate_ha_start_stale_peek_cleanup
  alias: "Inkplate: HA start — clear expired weather-peek override"
  # HA time triggers don't back-fire for times already in the past. If HA
  # restarts mid-peek and the expiry has passed, the peek would be stuck
  # forever. At startup, if we're in weather_peek with an expired datetime,
  # run the same restore cascade as the normal expiry path would have.
  trigger:
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_text.inkplate_active_override
      state: weather_peek
    - condition: template
      value_template: >-
        {% set e = states('input_datetime.inkplate_weather_peek_expires_at') %}
        {{ e and as_timestamp(e, 0) <= as_timestamp(now()) }}
  action:
    - variables:
        prior: "{{ states('input_text.inkplate_prior_override') }}"
        sched: "{{ states('input_text.inkplate_scheduled_face') }}"
        sonos_playing: "{{ states('media_player.kitchen_sonos') == 'playing' }}"
        restore: >-
          {% if prior == 'now_playing' and sonos_playing %}
            now_playing
          {% elif prior == 'summary_gallery_toggle' %}
            summary_gallery_toggle
          {% else %}
            schedule
          {% endif %}
        restore_mode: >-
          {% if prior == 'now_playing' and sonos_playing %}now-playing
          {% else %}{{ sched }}{% endif %}
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_active_override }
      data: { value: "{{ restore | trim }}" }
    - service: input_text.set_value
      target: { entity_id: input_text.inkplate_prior_override }
      data: { value: schedule }
    - service: mqtt.publish
      data:
        topic: inkplate/command/active_mode
        payload: "{{ restore_mode | trim }}"
        retain: true
    - service: mqtt.publish
      data:
        topic: inkplate/command/wake
        payload: ""
        retain: false
