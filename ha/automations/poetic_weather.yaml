# Night-mode poetic-weather-line picker — triggers on weather-bucket
# changes (not hourly), gated by the publisher kill-switch and night
# hours.
#
# Before 2026-05-20 this fired hourly between 21:00-07:00 and called
# Claude Haiku to generate a short observation, with the pool as a
# fallback. The LLM occasionally produced Romanian misspellings and
# the pool was already curated to the same voice, so
# add-night-text-clock-partials dropped the LLM, renamed
# `night_fallback_lines.yaml` → `night_poetic_pool.yaml`, and switched
# the trigger to bucket-change so stable weather doesn't churn the
# panel.

- id: inkplate_poetic_weather_bucket_change
  alias: "Inkplate: poetic-weather-line on bucket change"
  trigger:
    - platform: state
      entity_id: sensor.inkplate_night_poetic_bucket
      # `not_to` ignores transient unknown/unavailable when sensors
      # restart; the next valid state-change fires the action.
      not_to:
        - unknown
        - unavailable
        - ""
    # Safety republish on HA start so a fresh boot lands a line in
    # state/poetic_weather.txt even if the bucket sensor's value
    # hasn't changed since the prior shutdown.
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.inkplate_publisher_enabled
      state: "on"
    # No time-of-day gate. The panel only shows the Night face between
    # 22:00 and 06:30, so a daytime write doesn't affect what the user
    # sees — but it DOES guarantee `state/poetic_weather.txt` is fresh
    # before the next Night Full. The original automation had a 21:00–
    # 07:00 condition to avoid burning Anthropic API calls during the
    # day; the pool-only picker has no API cost so the gate is gone.
  action:
    - service: shell_command.generate_poetic_weather_line
      data:
        bucket: "{{ states('sensor.inkplate_night_poetic_bucket') }}"
