# Astro sensors for the Weather face footer.
#
# Base inputs: sun.sun, sensor.moon_phase (both from ha/integrations/zone_and_astro.yaml).
# Derived: next full moon, daylight duration, tonight's astronomical event (scrape).

- platform: template
  sensors:
    sunrise_today:
      friendly_name: "Today sunrise"
      device_class: timestamp
      value_template: "{{ state_attr('sun.sun','next_rising') }}"

    sunset_today:
      friendly_name: "Today sunset"
      device_class: timestamp
      value_template: "{{ state_attr('sun.sun','next_setting') }}"

    daylight_duration_minutes:
      friendly_name: "Today daylight duration"
      unit_of_measurement: "min"
      value_template: >-
        {% set rise = as_timestamp(state_attr('sun.sun','next_rising')) %}
        {% set set_ = as_timestamp(state_attr('sun.sun','next_setting')) %}
        {% if rise and set_ %}
          {# If sunset comes before sunrise, we're past sunrise today; use yesterday's rise. #}
          {% set delta = (set_ - rise) if set_ > rise else (set_ + 86400 - rise) %}
          {{ (delta / 60) | round(0) }}
        {% else %}
          0
        {% endif %}

    moon_phase_name:
      friendly_name: "Moon phase name"
      # Renderer maps this to an SVG glyph id in shared/icons.svg.
      value_template: "{{ states('sensor.moon_phase') }}"

    # Synodic-month math from a reference new-moon timestamp. HA's `moon`
    # integration no longer exposes `next_full_moon` as an attribute in
    # recent versions, so we compute both the illumination percentage and
    # the next full-moon date ourselves. Anchors: 2026-04-17 11:50 UTC
    # (new moon) and 2026-05-01 23:22 UTC (full moon). Synodic month
    # 29.530588 days. Good to ~1 h over a year without needing a lookup
    # table; update the anchors if the sensor drifts.
    moon_illumination_pct:
      friendly_name: "Moon illumination (%)"
      unit_of_measurement: "%"
      # Triangular approximation of the illuminated fraction (exact at the
      # four cardinal phases, within ~10% at the eighths). Avoids trig.
      value_template: >-
        {% set anchor = as_timestamp('2026-04-17T11:50:00+00:00') %}
        {% set synodic = 29.530588 * 86400 %}
        {% set age_sec = (as_timestamp(now()) - anchor) % synodic %}
        {% set age_days = age_sec / 86400 %}
        {% if age_days <= 14.765294 %}
          {{ (age_days / 14.765294 * 100) | round(0) }}
        {% else %}
          {{ ((29.530588 - age_days) / 14.765294 * 100) | round(0) }}
        {% endif %}

    next_full_moon_date:
      friendly_name: "Next full moon"
      value_template: >-
        {% set anchor = as_timestamp('2026-05-01T23:22:00+00:00') %}
        {% set synodic = 29.530588 * 86400 %}
        {% set now_ts = as_timestamp(now()) %}
        {% set offset = now_ts - anchor %}
        {% if offset <= 0 %}
          {{ anchor | timestamp_custom('%Y-%m-%d', true) }}
        {% else %}
          {% set cycles = (offset / synodic) | int %}
          {{ (anchor + (cycles + 1) * synodic) | timestamp_custom('%Y-%m-%d', true) }}
        {% endif %}

# (The command_line astro_event_tonight sensor moved to
# ha/integrations/command_line_sensors.yaml — HA 2023.6+ silently drops the
# legacy `- platform: command_line` form under `sensor:`.)
