note: |
  Contemporary pen-and-ink / screentone / ligne-claire canon, assembled
  after the operator review on 2026-04-19 found that tonal-printmaking
  anchors (aquatint, crayon lithograph, dense cross-hatched etching)
  render poorly on 3-bit e-ink. Everything here is native line work —
  the medium the panel reproduces best.

  All entries route `rights_tier: personal_library` (20th/21st-c work
  still in copyright). Source is `web` unless a specific foundation /
  API exists. XKCD uses its dedicated public JSON API.

