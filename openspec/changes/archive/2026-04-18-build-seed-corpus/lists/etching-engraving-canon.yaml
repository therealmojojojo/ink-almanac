category: etching-engraving-canon
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Canonical intaglio prints — etchings and engravings. All items
  `panel_fidelity: native` (pure line + hatch, no hue). Every artist
  is deep-PD (pre-1800 or 19c with decisive-moment death dates).
  Sources: Met Open Access (most Rembrandt, Goya, Dürer), Rijksmuseum
  (some Rembrandt), LoC P&P, Wikimedia Commons.

  Five of the 10 Dürer/Piranesi pieces already appear in `drawing-canon.yaml`
  or are on disk (piranesi-carceri-vii-drawbridge, piranesi-pantheon-interior).
  Consolidate or drop duplicates at list-approval; Piranesi is canonical
  enough to merit a second pass here.

