notes: |
  Emil Brumaru (1938–2019). All personal_library. Served in Romanian.
  Specific poem titles proposed from the major volumes; operator may swap in
  preferred pieces at list-review time — Brumaru has a large corpus of short
  forms, erotic idylls, and miniatures, and "the canon" for a household is the
  operator's own canon as much as the critical one.

