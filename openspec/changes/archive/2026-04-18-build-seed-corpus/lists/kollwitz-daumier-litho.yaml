category: kollwitz-daumier-litho
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Monochrome lithograph canon — Kollwitz, Daumier, Toulouse-Lautrec sketch
  work, and Goya's *Bulls of Bordeaux* series. All `panel_fidelity: native`.
  Daumier d.1879, Toulouse-Lautrec d.1901, Goya d.1828, Kollwitz d.1945 —
  all PD. Kollwitz drawings/etchings already appear in `drawing-canon.yaml`
  (kollwitz-self-portrait-charcoal, kollwitz-mother-dead-child, kollwitz-weavers-storm);
  this list focuses on her lithographs specifically plus Daumier/Lautrec/Goya
  additions.

