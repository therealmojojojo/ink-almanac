category: romanian-poetry-expansion
side: text
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Canonical Romanian poetry beyond Brumaru and Dinescu — Eminescu, Bacovia,
  Arghezi, Blaga, Barbu, Nichita Stănescu, Marin Sorescu, Ana Blandiana,
  Mircea Cărtărescu. Reinforces the 25% Romanian-text floor and adds depth
  to the household voice.

  Tier by d-date + 70y:
    Eminescu d.1889, Bacovia d.1957, Arghezi d.1967, Blaga d.1961,
    Barbu d.1961 — mix (Eminescu PD; mid-century in copyright as of 2026).
    Stănescu d.1983, Sorescu d.1996, Blandiana b.1942, Cărtărescu b.1956 —
    all personal_library.

  Language: all items `language: [ro]` (Romanian original); English
  translation variants optional at fetch (available for Blaga, Sorescu,
  Blandiana, Stănescu via canonical anglophone editions).

