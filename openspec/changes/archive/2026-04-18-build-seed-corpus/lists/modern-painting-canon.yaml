category: modern-painting-canon
side: image
proposed_by: claude
proposed_at: 2026-04-16
status: retired
retired_at: 2026-04-17
retired_reason: |
  Retired after the native-B&W pivot (see RETIRED.md in this directory).
  The 3-bit greyscale Inkplate 10 panel cannot encode hue, and most items on
  this list were color-dependent: Matisse, Warhol color work, Hopper's
  color-temperature paintings, Klee's *Senecio*, Iancu's Tzara portrait.
  Survivors (the drawings) are re-homed under `drawing-canon.yaml`:
    - modigliani-jeanne-drawing       (already `form: drawing`)
    - schiele-seated-woman-bent-knee  (already `form: drawing`)
    - klee-twittering-machine         (line-art; panel_fidelity: native)
    - warhol-blotted-line-portrait    (pre-Pop blotted-line; native)
    - matisse-blue-nude-II            (gouache cutout, graphic silhouette; native)
  Dropped outright as color-dependent:
    - schiele-self-physalis           (watercolor; hue-carried)
    - klee-senecio                    (hue-structure painting)
    - hopper-nighthawks               (color-temperature)
    - hopper-morning-sun              (color-temperature)
    - iancu-portrait-tzara            (color painting; figure read via hue)
  Do not execute `corpus fetch-list` against this file. It is preserved for
  curatorial history, not for ingestion.
notes: |
  Original note — Modern painting canon spanning from early-20c (PD) through
  mid-20c Americans (personal_library). Per-item tier reflects EU 70-years-
  after-death rule:
  - Schiele d.1918 / Modigliani d.1920 / Klee d.1940 / Matisse d.1954 → PD
  - Hopper d.1967, Warhol d.1987, Iancu d.1984 → personal_library

