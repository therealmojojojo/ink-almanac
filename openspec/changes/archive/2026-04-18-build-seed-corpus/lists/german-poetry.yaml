category: german-poetry
side: text
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Canonical German-language poetry from Goethe through the 20c.
  Tier routing by death-date + 70y:
    Goethe d.1832, Schiller d.1805, Novalis d.1801, Hölderlin d.1843,
    Heine d.1856, Eichendorff d.1857, Mörike d.1875, Rilke d.1926,
    Trakl d.1914 — all PD.
    Celan d.1970, Benn d.1956, Bachmann d.1973, Brecht d.1956 —
    personal_library (still in copyright under EU 70y rule as of 2026).
  Bilingual (de + en) where canonical translations exist — Hamburger
  for Hölderlin/Celan, Middleton for Goethe/Brecht, Stephen Mitchell
  or Gary Miranda for Rilke, Michael Hofmann for Trakl/Benn.

