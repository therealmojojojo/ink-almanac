category: drawing-canon
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  First list authored under the native-B&W pivot. Absorbs the five survivors
  from the retired modern-painting-canon (Modigliani/Schiele drawings, Klee
  Twittering Machine, Matisse Blue Nude II, Warhol blotted-line) and adds
  Dürer, Kollwitz, Redon charcoal, Steinberg, Gorey, Beardsley, Hokusai Manga
  pages. All items are pure line or tonal-only graphite/charcoal/ink — full
  panel-native fidelity.

  Tier routing: Dürer d.1528, Beardsley d.1898, Kollwitz d.1945, Redon d.1916,
  Schiele d.1918, Modigliani d.1920, Klee d.1940, Matisse d.1954, Hokusai
  d.1849 — all past 70y, so all PD where the reproduction source allows.
  Steinberg d.1999, Gorey d.2000, Warhol d.1987 — personal_library (web).

