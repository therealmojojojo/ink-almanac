category: romantic-symbolist-poetry
side: text
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Canonical Romantic (English/early-19c) and French Symbolist (late-19c)
  poetry. Every item is well past 70-years-after-death, so all PD.
  English Romantics — Blake d.1827, Wordsworth d.1850, Coleridge d.1834,
  Byron d.1824, Keats d.1821, Shelley d.1822. French Symbolists —
  Baudelaire d.1867, Verlaine d.1896, Rimbaud d.1891, Mallarmé d.1898.
  Early Yeats (pre-1900) also folded in as a transitional Symbolist voice.
  Bilingual (en + fr/de where applicable) per the established pattern for
  non-English canon.

