notes: |
  Night-pool canonical list — vertical / tall-format nocturnal images for the
  Night face's ~70% tall image zone. Dark tonal range, restful or quietly
  atmospheric, no high-energy action. Mix of PD and PL tiers.
  Targets ≥30 items per the corpus-seed floor.

