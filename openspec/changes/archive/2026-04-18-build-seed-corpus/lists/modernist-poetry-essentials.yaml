category: modernist-poetry-essentials
side: text
proposed_by: claude
proposed_at: 2026-04-16
notes: |
  Modernist / late-20c poetry essentials. Rights-tier routing per poet death-year:
  - Yeats (d.1939), Rilke (d.1926), Pessoa (d.1935) → public_domain
  - Auden (d.1973), Szymborska (d.2012), Milosz (d.2004), Transtromer (d.2015),
    Heaney (d.2013) → personal_library
  Non-Romanian served in English translation per operator's taste file.

