notes: |
  Cavafy (d.1933) — original Greek poems are PD, but the canonical English
  translations by Edmund Keeley and Philip Sherrard (Princeton UP, 1975 /
  revised 1992) are personal_library. Served as bilingual pairs (English primary,
  Greek original alongside) under personal_library tier on account of the
  translation; PD via wikisource for Greek-only fallback.

