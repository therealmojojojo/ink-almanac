category: iconic-photography-expansion
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Non-Magnum iconic B&W photographers — the canon outside (or overlapping)
  Magnum. Together with `magnum-photography.yaml` and the existing
  `midcentury-photography.yaml`, this list drives the seed corpus past the
  50% B&W-photography floor and builds a real 20c canon.

  All items `panel_fidelity: native` (silver gelatin or equivalent B&W).
  Almost all in copyright → `personal_library`, source: web.

  Exceptions: Stieglitz d.1946, Strand d.1976 → PD (70y from d.1946 reached
  2017); Weston d.1958 → PD as of 2029 — kept personal_library here.
  August Sander d.1964, Lartigue d.1986, Lange d.1965, Evans d.1975,
  Mapplethorpe d.1989, Avedon d.2004, Arbus d.1971, Frank d.2019, Winogrand
  d.1984, Adams d.1984, Levitt d.2009, Brandt d.1983, Sudek d.1976, Parks
  d.2006, DeCarava d.2009, Álvarez Bravo d.2002, Iturbide b.1942,
  Moriyama b.1938, Tōmatsu d.2012, Fan Ho d.2016, Penn d.2009, Turnley b.1955,
  Salgado b.1944, Friedlander b.1934, Smith d.1978, Mann b.1951 — all
  in-copyright; personal_library tier with cited monographs.

  Overlap note: Salgado appears in `magnum-photography.yaml` with *Gold
  Mine* and *Southern Right Whale*. The two entries below are additional
  canonical works, different series; keep or consolidate at list-approval.

