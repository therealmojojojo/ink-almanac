category: sumi-e-canon
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Japanese and Chinese ink-wash painting (sumi-e / shuǐ-mò-huà). Pure-value
  tradition — the panel's native medium. All `panel_fidelity: native`.
  All artists deep-PD (15c–19c, or early 20c Chinese). Sources: Met Open
  Access, Tokyo National Museum, Shanghai Museum (via Wikimedia), Palace
  Museum Beijing, Cleveland Museum.

  Some 20c masters (Qi Baishi d.1957, Zhang Daqian d.1983) are
  personal_library tier; flagged per item.

