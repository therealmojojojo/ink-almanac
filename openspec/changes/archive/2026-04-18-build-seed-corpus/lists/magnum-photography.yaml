category: magnum-photography
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Canonical B&W work from Magnum Photos members (agency founded 1947).
  Pushes the B&W-photography share toward the 50% seed-corpus floor.
  All items `panel_fidelity: native` (silver gelatin or digital B&W).
  Tier: all `personal_library` — every photographer is post-1947 and
  in copyright. Source: web (museum pages, Magnum's own site, publisher
  previews). HCB and Koudelka already have partial coverage in
  `midcentury-photography.yaml` — this list extends those plus adds
  Capa, Chim, Rodger (founders), and the second and third generations.

