category: wood-engraving-canon
side: image
proposed_by: claude
proposed_at: 2026-04-17
notes: |
  Modern wood engraving — fine-line relief prints from end-grain wood blocks,
  distinct from the earlier woodblock tradition. Introduced as its own
  `form: wood-engraving` vocab entry 2026-04-17. Always monochrome, cut with
  burins. All `panel_fidelity: native`.

  Dominant 20c canon: Lynd Ward's wordless novels (US), Leonard Baskin,
  Paul Landacre, Eric Gill, Clare Leighton, Rockwell Kent, Gwen Raverat.
  Gill d.1940, Landacre d.1963, Ward d.1985, Baskin d.2000, Kent d.1971,
  Leighton d.1989, Raverat d.1957 — all in copyright → personal_library.

