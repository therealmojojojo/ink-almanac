notes: |
  Classical haiku canon — Bashō (d.1694), Buson (d.1784), Issa (d.1828), Ryōkan
  (d.1831). All PD. Served bilingual where possible: English translation primary,
  Japanese original retained as a second language variant. Translations: Robert
  Hass (*The Essential Haiku*, Ecco, 1994) where used; Sam Hamill elsewhere.

