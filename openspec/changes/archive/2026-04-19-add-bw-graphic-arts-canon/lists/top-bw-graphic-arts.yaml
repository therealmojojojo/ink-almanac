# ── Excluded with reason ──────────────────────────────────────────────
# Deliberately NOT in the 28:
#   - Hokusai, Hiroshige, Utamaro — ukiyo-e is colour woodblock; desaturation
#     does not render faithfully. Hokusai's Manga pen drawings would qualify
#     as a separate category.
#   - Matisse, Klee, Bonnard, Chagall — core œuvre is colour.
#   - Leonardo, Michelangelo, Raphael drawings — canonical but primarily
#     working-study material; less legible as standalone images on a
#     kitchen display.
#   - Schongauer, Mantegna, Lucas van Leyden, Goltzius — early engraving
#     masters; tight audience. Add if a later expansion round seeks
#     pre-Dürer depth.
#   - Mapplethorpe, Crumb, Pettibon — content-intensive for a kitchen display.
#
# Candidates for 29/30 if expanding:
#   - Adolph Menzel (19c German draughtsman)
#   - Alberto Giacometti drawings
#   - Leonard Baskin (American wood engraving)

