recipe: top-bw-graphic-arts
generated: 2026-04-19
note: |
  Stage-1 shortlist for native-black-and-white graphic art — the non-photograph
  spine of the gallery pool. Each item is a creator; stage-2 fans out to one
  works list per creator (5–10 works each).

  "Native B&W" means the work was authored in a monochrome medium — etching,
  engraving, wood engraving, lithograph (B&W), drypoint, aquatint, pen-and-ink
  drawing, graphite/charcoal/conté drawing, ink wash (sumi-e). Paintings whose
  colour has been desaturated to greyscale are explicitly excluded; they do
  not render faithfully on a 3-bit panel and produced the quality failure that
  motivated this list.

  `in_corpus` counts are items currently on disk per creator BEFORE stage-2
  fetch. Rights tier is `public_domain` via museum API wherever an archival
  scan exists; `personal_library` (web) only for 20th/21st-c creators whose
  works are behind copyright and not available via PD museum APIs.

  Canon weight: core (must-include), canonical (strongly canonical, minor
  taste variance), strong (solid inclusion with some taste dependence).

