# Night-poetic-line pool — starter content (5 entries per bucket).
#
# This file is illustrative for the change `replace-poetic-llm-with-pool`.
# When the change is implemented, this becomes the seed content of
# `ha/config/night_poetic_pool.yaml`.
#
# Per-line rules (validated by ha/scripts/generate_poetic_weather_line.sh):
#   * Charset: [A-Za-z0-9 ,.:;!\-'"]+ — ASCII letters, digits, space,
#     and the punctuation set listed. No diacritics, no emoji, no curly
#     quotes, no em-dashes.
#   * Length: 1..40 graphemes.
#   * Voice: plain, observational, slightly melancholy.
#
# Operator guidance:
#   * 5 entries per bucket is the seed minimum. Aim for 8-15 to keep
#     visible repetition low across multi-night stretches of identical
#     weather.
#   * The line is now only re-picked on bucket-state-change, not every
#     hour, so repetition only matters when the bucket stays the same
#     across multiple nights without any transition.

clear_cold:        # clear sky + temp <= 5 C
  - "Clear sky, the cold has settled."
  - "Stars over a hard, still ground."
  - "The cold and the stars keep watch."
  - "A clean, frosted dark."
  - "Cold air, the stars seem closer."

clear_mild:        # clear sky + 6-18 C
  - "A clear, mild night."
  - "Stars without a chill."
  - "Open sky, easy air."
  - "Soft dark, the stars are kind."
  - "Mild night, the stars steady."

clear_warm:        # clear sky + >= 19 C
  - "Warm air, the stars are loose."
  - "A summer night, sky clear."
  - "Heat held over, stars above."
  - "Bright stars on a warm hour."
  - "Soft warm dark, a clear sky."

partly_cloudy:
  - "Stars and cloud, taking turns."
  - "Cloud passes, then a few stars."
  - "Half-clear, half-covered."
  - "A shifting sky, cloud and dark."
  - "The moon, then cloud, then moon."

cloudy:            # cloudy/overcast + temp > 5
  - "A low grey sky, no stars."
  - "The clouds have settled in."
  - "Soft cloud, no break tonight."
  - "Grey sky, a quiet hour."
  - "Cloud over cloud, still air."

cloudy_cold:       # cloudy/overcast + temp <= 5
  - "Cold clouds over a cold ground."
  - "Grey sky, the cold deepens."
  - "Closed sky, the cold settles."
  - "A cold, low ceiling of cloud."
  - "Cloud and cold, no stars."

fog:
  - "Fog has come down to the street."
  - "A soft fog, edges gone."
  - "The fog hides the lamp posts."
  - "Slow fog, a quieter night."
  - "Fog over the ground, no sky."

rain:              # steady rain
  - "Rain on the roof, soft and steady."
  - "A long, gentle rain tonight."
  - "Rain falling, the street darkens."
  - "Soft rain, a quiet hour."
  - "Rain on the leaves, on the road."

pouring:           # heavy rain
  - "Hard rain, the gutters running."
  - "Rain coming down in sheets."
  - "Heavy rain, the night is loud."
  - "Pouring rain, the street is washed."
  - "Rain and more rain, no break."

thunderstorm:      # lightning, lightning-rainy, hail, exceptional
  - "Thunder, then a long quiet."
  - "Lightning over the dark fields."
  - "A storm passing, slow and loud."
  - "Thunder fading into rain."
  - "Lightning, then thunder, then rain."

snow:
  - "Snow on the road, no traffic."
  - "Soft snow falling all night."
  - "The snow has covered the fence."
  - "Snow steady, a hushed hour."
  - "Snow on the trees, slow and quiet."

sleet:             # snowy-rainy
  - "Sleet against the window."
  - "Half snow, half rain, all cold."
  - "Sleet falling, the path is glass."
  - "A grey night, sleet on the road."
  - "Sleet on the sill, soft and sharp."

windy_dry:         # windy, windy-variant
  - "Wind through the bare trees."
  - "A high wind, no rain."
  - "Wind on the roof, the door rattles."
  - "Long wind, the night is loose."
  - "Wind and dry leaves on the path."
